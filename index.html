<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Options Quest</title>
<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root{
  --bg:#0b0e14; --bg2:#10141c; --card:#141924; --card2:#1a212e; --line:#232b3a;
  --ink:#e6e9f0; --dim:#8a93a6; --faint:#5b6374;
  --accent:#3b82f6; --accent2:#60a5fa;
  --grad:linear-gradient(135deg,#3b82f6,#60a5fa);
  --green:#2fbf71; --red:#e5484d; --gold:#d4a72c;
  --radius:10px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--font);}
#app{max-width:640px;margin:0 auto;padding:0 20px 80px;min-height:100vh;}
#fx{position:fixed;inset:0;pointer-events:none;z-index:99;}
.num{font-variant-numeric:tabular-nums;}
h1,h2,h3{margin:0;font-weight:700;}
button{font-family:var(--font);}

/* screens & motion */
.screen{animation:fadein .16s ease both;max-width:640px;margin:0 auto;}
@keyframes fadein{from{opacity:0;}to{opacity:1;}}
@keyframes popin{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
@keyframes shakeX{20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.shake{animation:shakeX .35s both;}
.pop{animation:popin .16s ease both;}

/* responsive layout */
.cols2{display:grid;grid-template-columns:1fr;gap:0 24px;align-items:start;}
@media(min-width:960px){
  #app{max-width:1120px;}
  .screen.wide{max-width:1120px;}
  .screen.wide .cols2{grid-template-columns:1fr 1fr;}
  .lvlgrid{grid-template-columns:repeat(3,1fr);}
}
@media(min-width:1240px){ .screen.wide .lvlgrid{grid-template-columns:repeat(4,1fr);} }

/* HUD */
.hud{display:flex;align-items:center;gap:10px;padding:16px 0 12px;position:sticky;top:0;z-index:10;
  background:linear-gradient(var(--bg) 78%, transparent);}
.hud .back{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:var(--card);
  color:var(--dim);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.hud .back:hover{color:var(--ink);border-color:var(--faint);}
.hud .spacer{flex:1;}
.pill{display:inline-flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--line);
  border-radius:6px;padding:5px 10px;font-size:12.5px;font-weight:600;color:var(--dim);}
.pill.xp{color:var(--accent2);}
.pill.streak{color:var(--gold);}
.pill.cash{color:var(--green);}

/* cards & buttons */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin:12px 0;}
.card.sub{background:var(--bg2);}
.btn{display:block;width:100%;padding:12px 18px;border-radius:8px;border:1px solid transparent;
  font-size:14.5px;font-weight:600;cursor:pointer;transition:filter .12s,border-color .12s;}
.btn:active{filter:brightness(.9);}
.btn.primary{background:var(--accent);color:#fff;}
.btn.primary:hover{filter:brightness(1.08);}
.btn.ghost{background:var(--card);color:var(--ink);border-color:var(--line);}
.btn.ghost:hover{border-color:var(--faint);}
.btn.green{background:var(--green);color:#05130c;}
.btn.red{background:var(--red);color:#fff;}
.btn.small{width:auto;display:inline-block;padding:8px 14px;font-size:13px;}
.btn:disabled{opacity:.4;cursor:default;}
.btnrow{display:flex;gap:10px;margin:12px 0;}
.btnrow .btn{flex:1;}
.menu{max-width:340px;margin:26px auto 0;display:grid;gap:10px;}

/* mentor */
.mentor{display:flex;gap:12px;align-items:flex-start;margin:14px 0;}
.mentor .owl{flex:0 0 44px;}
.bubble{background:var(--card);border:1px solid var(--line);border-radius:4px 12px 12px 12px;
  padding:14px 16px;font-size:15px;line-height:1.6;flex:1;}
.bubble b{color:var(--accent2);}
.bubble .hl{color:var(--gold);font-weight:600;}
.bubble .good{color:var(--green);font-weight:600;}
.bubble .bad{color:var(--red);font-weight:600;}

/* quiz */
.qopt{display:block;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);color:var(--ink);
  border-radius:8px;padding:13px 15px;font-size:14.5px;font-weight:500;margin:8px 0;cursor:pointer;transition:border-color .12s;}
.qopt:hover{border-color:var(--accent);}
.qopt.right{border-color:var(--green);background:rgba(47,191,113,.08);}
.qopt.wrong{border-color:var(--red);background:rgba(229,72,77,.08);}
.qopt:disabled{cursor:default;opacity:.8;}
.why{background:rgba(47,191,113,.06);border:1px solid rgba(47,191,113,.3);border-radius:8px;
  padding:12px 14px;font-size:13.5px;line-height:1.55;color:#a9d9c0;margin:10px 0;}
.combo{position:fixed;top:70px;right:24px;background:var(--card2);border:1px solid var(--accent);
  color:var(--accent2);font-weight:700;border-radius:6px;padding:5px 11px;font-size:12.5px;z-index:20;}

/* progress bar */
.prog{height:4px;background:var(--card);border-radius:99px;overflow:hidden;flex:1;}
.prog>i{display:block;height:100%;background:var(--accent);transition:width .3s ease;}

/* course map */
.chap{margin:22px 0;}
.chap h2{font-size:13px;letter-spacing:1.4px;text-transform:uppercase;color:var(--dim);margin-bottom:3px;}
.chap .sub{font-size:13px;color:var(--faint);margin-bottom:10px;}
.lvlgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.lvl{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;cursor:pointer;
  transition:border-color .12s;position:relative;}
.lvl:hover{border-color:var(--accent);}
.lvl.locked{opacity:.45;cursor:default;}
.lvl.locked:hover{border-color:var(--line);}
.lvl .n{font-size:10.5px;color:var(--faint);font-weight:700;letter-spacing:.8px;}
.lvl .t{font-size:14px;font-weight:600;margin:4px 0 6px;line-height:1.3;}
.lvl .stars{font-size:12.5px;letter-spacing:2px;color:var(--gold);}
.lvl.boss{border-color:rgba(212,167,44,.45);}
.lvl.boss .n{color:var(--gold);}
.lvl.done::after{content:"¹3";position:absolute;top:10px;right:12px;color:var(--green);font-weight:700;}

/* stat rows / chips */
.statrow{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;font-size:14px;border-bottom:1px solid var(--line);}
.statrow:last-child{border-bottom:none;}
.statrow .k{color:var(--dim);}
.statrow .v{font-weight:600;}
.chip{display:inline-block;background:var(--bg2);border:1px solid var(--line);border-radius:6px;
  padding:3px 9px;font-size:12px;font-weight:600;color:var(--dim);margin:2px;}
.chip.green{color:var(--green);border-color:rgba(47,191,113,.4);}
.chip.red{color:var(--red);border-color:rgba(229,72,77,.4);}
.chip.gold{color:var(--gold);border-color:rgba(212,167,44,.4);}
.bignum{font-size:28px;font-weight:700;letter-spacing:-.3px;}
.green{color:var(--green);} .red{color:var(--red);} .dim{color:var(--dim);} .gold{color:var(--gold);}

/* sliders */
input[type=range]{width:100%;accent-color:var(--accent);height:30px;cursor:pointer;}

/* option chain */
.chain{width:100%;border-collapse:collapse;font-size:13px;}
.chain th{color:var(--faint);font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;padding:6px 4px;font-weight:600;}
.chain td{padding:9px 4px;text-align:center;border-top:1px solid var(--line);font-weight:500;}
.chain .strike{background:var(--bg2);font-weight:700;color:var(--gold);}
.chain tr.itmC td.c{background:rgba(47,191,113,.05);}
.chain tr.itmP td.p{background:rgba(229,72,77,.05);}
.chain tr{cursor:pointer;}
.chain tr:hover td{background:rgba(59,130,246,.1);}
.chain .hdrow th{cursor:default;}

/* trade ticket / sheet */
.sheet-back{position:fixed;inset:0;background:rgba(4,6,10,.72);z-index:30;animation:fadein .15s both;}
.sheet{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:560px;z-index:31;
  background:var(--bg2);border:1px solid var(--line);border-bottom:none;border-radius:14px 14px 0 0;
  padding:20px 18px 26px;animation:sheetup .22s ease both;max-height:88vh;overflow-y:auto;}
@keyframes sheetup{from{transform:translate(-50%,40%);opacity:.4;}to{transform:translate(-50%,0);opacity:1;}}
.sheet h3{font-size:17px;margin-bottom:4px;}
@media(min-width:960px){
  .sheet{bottom:auto;top:50%;transform:translate(-50%,-50%);border-radius:12px;border-bottom:1px solid var(--line);}
  @keyframes sheetup{from{opacity:0;transform:translate(-50%,-48%);}to{opacity:1;transform:translate(-50%,-50%);}}
}

/* misc */
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:80px;background:var(--card2);border:1px solid var(--line);
  color:var(--ink);border-radius:8px;padding:11px 18px;font-weight:600;font-size:13.5px;z-index:60;animation:popin .2s both;
  box-shadow:0 8px 28px rgba(0,0,0,.5);}
.xpfly{position:fixed;color:var(--accent2);font-weight:700;font-size:14px;z-index:70;pointer-events:none;animation:xpfly 1s ease-out both;}
@keyframes xpfly{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(-48px);}}
.center{text-align:center;}
.tickertabs{display:flex;gap:8px;margin:10px 0;}
.ttab{flex:1;padding:9px;border-radius:8px;background:var(--card);border:1px solid var(--line);color:var(--dim);
  font-weight:600;cursor:pointer;text-align:center;font-size:13px;}
.ttab.on{border-color:var(--accent);color:var(--ink);}
.ttab.locked{opacity:.35;cursor:default;}
.poscard{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:11px 13px;margin:8px 0;}
.poscard .top{display:flex;justify-content:space-between;font-weight:600;font-size:13.5px;}
.poscard .bot{display:flex;justify-content:space-between;color:var(--dim);font-size:12px;margin-top:4px;align-items:center;}
.legrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px;font-weight:600;}
.divider{height:1px;background:var(--line);margin:14px 0;}
.tag{font-size:10.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--faint);}
svg text{font-family:var(--font);}
.toy{margin:8px 0;}
.footer-note{color:var(--faint);font-size:11.5px;text-align:center;margin-top:26px;line-height:1.6;}

/* glossary drawer */
.gloss-fab{position:fixed;right:18px;bottom:18px;z-index:28;width:46px;height:46px;border-radius:50%;
  background:var(--card2);border:1px solid var(--line);color:var(--accent2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(0,0,0,.45);
  transition:border-color .12s, transform .1s;}
.gloss-fab:hover{border-color:var(--accent);transform:translateY(-1px);}
.gloss-back{position:fixed;inset:0;background:rgba(4,6,10,.55);z-index:40;animation:fadein .15s both;}
.gloss{position:fixed;top:0;right:0;height:100%;width:min(480px,96vw);z-index:41;background:var(--bg2);
  border-left:1px solid var(--line);display:flex;flex-direction:column;animation:glossin .22s ease both;}
@keyframes glossin{from{transform:translateX(60%);opacity:.5;}to{transform:none;opacity:1;}}
.gloss header{display:flex;align-items:center;gap:10px;padding:16px 18px 10px;}
.gloss header h2{font-size:16px;flex:1;}
.gloss .x{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--card);
  color:var(--dim);font-size:15px;cursor:pointer;}
.gloss .x:hover{color:var(--ink);border-color:var(--faint);}
.gloss .search{margin:0 18px 10px;}
.gloss .search input{width:100%;padding:10px 13px;border-radius:8px;border:1px solid var(--line);
  background:var(--card);color:var(--ink);font-size:14px;font-family:var(--font);outline:none;}
.gloss .search input:focus{border-color:var(--accent);}
.gloss .body{flex:1;overflow-y:auto;padding:0 18px 26px;overscroll-behavior:contain;}
.gloss .cat{font-size:10.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--accent2);
  margin:18px 0 4px;padding-bottom:5px;border-bottom:1px solid var(--line);}
.gloss .entry{border-bottom:1px solid rgba(35,43,58,.5);}
.gloss .ehead{display:flex;align-items:center;gap:8px;padding:10px 0;cursor:pointer;}
.gloss .ehead:hover .term{color:var(--accent2);}
.gloss .entry .term{font-weight:700;font-size:13.5px;transition:color .12s;}
.gloss .entry .def{color:var(--dim);font-size:12.5px;line-height:1.5;margin-top:2px;}
.gloss .chev{color:var(--faint);font-size:12px;transition:transform .15s;flex:0 0 auto;}
.gloss .entry.open .chev{transform:rotate(180deg);color:var(--accent2);}
.gloss .more{display:none;padding:0 0 14px;}
.gloss .entry.open .more{display:block;animation:popin .15s both;}
.gloss .ldef{font-size:13px;line-height:1.65;color:#c3cad8;}
.gloss .ldef b{color:var(--accent2);}
.gloss .exbox{background:rgba(212,167,44,.07);border:1px solid rgba(212,167,44,.3);border-radius:8px;
  padding:10px 12px;font-size:12.5px;line-height:1.6;color:#d9caa3;margin:10px 0 0;}
.gloss .exbox b{color:var(--gold);}
.gloss .ghint{color:var(--faint);font-size:11.5px;margin:0 18px 4px;}
.gloss .none{color:var(--faint);font-size:13px;text-align:center;padding:30px 0;}
</style>

<body>
<div id="app"></div>
<canvas id="fx"></canvas>
<script>
'use strict';
/* ============================================================
   1. UTILS
   ============================================================ */
function mulberry32(seed){ let a = seed>>>0; return function(){
  a|=0; a = a + 0x6D2B79F5 | 0;
  let t = Math.imul(a ^ a>>>15, 1 | a);
  t = t + Math.imul(t ^ t>>>7, 61 | t) ^ t;
  return ((t ^ t>>>14) >>> 0) / 4294967296;
};}
function gaussOf(rnd){ // Box-Muller
  let u=0,v=0; while(u===0)u=rnd(); while(v===0)v=rnd();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}
const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));
const round2=x=>Math.round(x*100)/100;
function fmt$(x,dec){ if(dec===undefined)dec = Math.abs(x)>=1000?0:2;
  const s = Math.abs(x).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});
  return (x<0?'-$':'$')+s;
}
function fmtPL(x){ return (x>=0?'+':'-')+'$'+Math.abs(x).toLocaleString('en-US',{minimumFractionDigits:Math.abs(x)>=1000?0:2,maximumFractionDigits:Math.abs(x)>=1000?0:2}); }
function plClass(x){ return x>=0?'green':'red'; }

// DOM helpers
function h(tag, attrs, ...kids){
  const e = document.createElement(tag);
  if(attrs) for(const k in attrs){
    if(k==='style' && typeof attrs[k]==='object') Object.assign(e.style, attrs[k]);
    else if(k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else if(k==='html') e.innerHTML = attrs[k];
    else if(k==='cls') e.className = attrs[k];
    else e.setAttribute(k, attrs[k]);
  }
  for(const kid of kids.flat(9)){
    if(kid===null||kid===undefined||kid===false) continue;
    e.append(kid.nodeType?kid:document.createTextNode(kid));
  }
  return e;
}
const SVGNS='http://www.w3.org/2000/svg';
function hs(tag, attrs, ...kids){
  const e = document.createElementNS(SVGNS, tag);
  if(attrs) for(const k in attrs){
    if(k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else if(k==='html') e.innerHTML = attrs[k];
    else e.setAttribute(k, attrs[k]);
  }
  for(const kid of kids.flat(9)){ if(kid) e.append(kid); }
  return e;
}
function countUp(el, from, to, fmt, ms){
  ms = ms||600; const t0 = performance.now();
  function tick(t){
    const p = clamp((t-t0)/ms,0,1), ease = 1-Math.pow(1-p,3);
    el.textContent = fmt(from + (to-from)*ease);
    if(p<1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
function toast(msg, ms){
  const t = h('div',{cls:'toast'},msg); document.body.append(t);
  setTimeout(()=>t.remove(), ms||1800);
}

/* ============================================================
   2. ENGINE — Black-Scholes, Greeks, market simulation
   ============================================================ */
function normCdf(x){ // Abramowitz-Stegun 7.1.26, |err| < 7.5e-8
  const t = 1/(1+0.2316419*Math.abs(x));
  const d = 0.3989422804014327*Math.exp(-x*x/2);
  const p = d*t*(0.319381530+t*(-0.356563782+t*(1.781477937+t*(-1.821255978+t*1.330274429))));
  return x>=0 ? 1-p : p;
}
const RFR = 0.04; // risk-free rate
function bsPrice(type, S, K, T, sigma, r){
  r = r===undefined?RFR:r;
  if(T<=0) return Math.max(type==='call'? S-K : K-S, 0);
  const sq = sigma*Math.sqrt(T);
  const d1 = (Math.log(S/K)+(r+sigma*sigma/2)*T)/sq, d2 = d1-sq;
  return type==='call'
    ? S*normCdf(d1) - K*Math.exp(-r*T)*normCdf(d2)
    : K*Math.exp(-r*T)*normCdf(-d2) - S*normCdf(-d1);
}
function bsDelta(type, S, K, T, sigma){
  if(T<=0) return (type==='call' ? (S>K?1:0) : (S<K?-1:0));
  const d1 = (Math.log(S/K)+(RFR+sigma*sigma/2)*T)/(sigma*Math.sqrt(T));
  return type==='call' ? normCdf(d1) : normCdf(d1)-1;
}
// finite-difference: theta = value drop of one trading day (matches Advance Day exactly)
function bsThetaDay(type, S, K, T, sigma){
  return bsPrice(type,S,K,Math.max(T-1/252,0),sigma) - bsPrice(type,S,K,T,sigma);
}
function bsVega(type, S, K, T, sigma){ // per 1 vol pt
  return bsPrice(type,S,K,T,sigma+0.01) - bsPrice(type,S,K,T,sigma);
}
const SPREAD = 0.02; // ±2% of mid
function quote(type, S, K, T, sigma){
  const mid = bsPrice(type,S,K,T,sigma);
  const half = Math.max(mid*SPREAD, 0.01);
  return { mid:round2(mid), bid:round2(Math.max(mid-half,0)), ask:round2(mid+half) };
}

// ---- positions -------------------------------------------------
// leg: {type:'call'|'put'|'stock', side:+1|-1, strike, qty, premium(per share, entry), dte(entry days)}
function legMarkPerShare(leg, S, dte, iv){ // liquidation value per share (mid-based, spread applied)
  if(leg.type==='stock') return S;
  const T = Math.max(dte,0)/252;
  const q = quote(leg.type, S, leg.strike, T, iv);
  return leg.side>0 ? q.bid : q.ask; // long sells at bid, short covers at ask
}
function legPL(leg, S, dte, iv){
  const mark = legMarkPerShare(leg, S, dte, iv);
  const mult = leg.type==='stock'?1:100;
  return round2(leg.side*(mark - leg.premium)*leg.qty*mult);
}
function posPL(legs, S, dte, iv){ return round2(legs.reduce((a,l)=>a+legPL(l,S,dte,iv),0)); }
function posEntryCost(legs){ // net debit(+)/credit(-) in dollars
  return round2(legs.reduce((a,l)=>a + l.side*l.premium*l.qty*(l.type==='stock'?1:100), 0));
}
function legLabel(l){
  if(l.type==='stock') return (l.side>0?'Long ':'Short ')+l.qty+' shares';
  return (l.side>0?'Buy ':'Sell ')+l.qty+' × $'+l.strike+' '+(l.type==='call'?'Call':'Put');
}
// expiry P/L per share of underlying at price X for the whole position (per 1 contract qty basis handled inside)
function expiryPL(legs, X){
  let pl = 0;
  for(const l of legs){
    if(l.type==='stock'){ pl += l.side*(X - l.premium)*l.qty; continue; }
    const intr = l.type==='call'? Math.max(X-l.strike,0) : Math.max(l.strike-X,0);
    pl += l.side*(intr - l.premium)*l.qty*100;
  }
  return pl;
}

// ---- scenario market (campaign) --------------------------------
// cfg: {S0, iv, path:[+pct...], ivPath:[...], noise, seed}
function ScenarioMarket(cfg){
  const rnd = mulberry32(cfg.seed||42);
  const m = {
    day:0, S:cfg.S0, iv:cfg.iv, hist:[cfg.S0], events:cfg.events||{},
    done(){ return m.day >= cfg.path.length; },
    step(){
      if(m.done()) return;
      let pct = cfg.path[m.day];
      if(cfg.noise) pct += (rnd()-0.5)*cfg.noise;
      m.S = round2(m.S*(1+pct/100));
      m.day++;
      if(cfg.ivPath && cfg.ivPath[m.day-1]!==undefined) m.iv = cfg.ivPath[m.day-1];
      m.hist.push(m.S);
    }
  };
  return m;
}

// ---- sandbox market --------------------------------------------
const TICKERS = {
  SBUX:{name:'Starbucks Corporation', S0:100, iv:0.22, drift:0.06},
  PLTR:{name:'Palantir Technologies', S0:50,  iv:0.65, drift:0.10, earnings:true},
  DIS:{name:'The Walt Disney Company', S0:80, iv:0.28, drift:0.05},
};
function sbStepTicker(tk){ // one trading day for a sandbox ticker state {seed,i,S,iv,hist,nextEarn}
  const info = TICKERS[tk.sym];
  const rnd = mulberry32(tk.seed + tk.i*7919);
  const z = gaussOf(rnd);
  const dt = 1/252;
  let sigma = tk.iv;
  let jump = 0, note = null;
  if(info.earnings){
    tk.nextEarn--;
    if(tk.nextEarn<=0){ // earnings day: gap + IV crush
      jump = (rnd()<0.55?1:-1)*(3+rnd()*9);
      tk.iv = info.iv*0.65;
      tk.nextEarn = 18+Math.floor(rnd()*8);
      note = ''+tk.sym+' earnings! Stock '+(jump>0?'gapped up':'gapped down')+' '+Math.abs(jump).toFixed(1)+'%, IV crushed.';
    } else if(tk.nextEarn<=5){ tk.iv = Math.min(tk.iv+0.045, info.iv*1.6); } // ramp into earnings
    else { tk.iv += (info.iv - tk.iv)*0.1; }
  }
  const step = Math.exp((info.drift - sigma*sigma/2)*dt + sigma*Math.sqrt(dt)*z);
  tk.S = round2(Math.max(tk.S*step*(1+jump/100), 1));
  tk.i++;
  tk.hist.push(tk.S);
  if(tk.hist.length>90) tk.hist.shift();
  return note;
}

// ---- payoff diagram (SVG) --------------------------------------
// payoffDiagram({height?, showToday?}) -> {el, update({legs, spot, iv, dte, range?, marker?})}
function payoffDiagram(opts){
  opts = opts||{};
  const W=460, H=opts.height||230, padL=8, padR=8, padT=16, padB=24;
  const svg = hs('svg',{viewBox:'0 0 '+W+' '+H, style:'width:100%;height:auto;display:block;touch-action:none;'});
  const el = h('div',{cls:'card sub',style:{padding:'8px 10px'}}, svg);
  let st = null;
  const px = (p,lo,hi)=> padL + (p-lo)/(hi-lo)*(W-padL-padR);
  function update(state){
    st = state;
    const {legs, spot} = state;
    let lo, hi;
    if(state.range){ [lo,hi]=state.range; }
    else{
      const ks = legs.filter(l=>l.type!=='stock').map(l=>l.strike);
      const ref = ks.length? ks.concat([spot]) : [spot];
      const mn=Math.min.apply(0,ref), mx=Math.max.apply(0,ref);
      const span = Math.max(mx-mn, spot*0.22);
      lo = Math.max(mn-span*0.75, 0.01); hi = mx+span*0.75;
    }
    const N=140, xs=[], pls=[];
    for(let i=0;i<=N;i++){ const p = lo+(hi-lo)*i/N; xs.push(p); pls.push(expiryPL(legs,p)); }
    let mnP=Math.min.apply(0,pls), mxP=Math.max.apply(0,pls);
    if(state.dte>0 && opts.showToday!==false){
      // widen y-range for today curve too
      for(let i=0;i<=N;i+=7){ const v=todayPL(legs, xs[i], state.dte, state.iv); mnP=Math.min(mnP,v); mxP=Math.max(mxP,v); }
    }
    const pad = Math.max((mxP-mnP)*0.15, 20); mnP-=pad; mxP+=pad;
    if(mnP>-pad) mnP=-pad*2; if(mxP<pad) mxP=pad*2;
    const py = v => padT + (mxP-v)/(mxP-mnP)*(H-padT-padB);
    const y0 = py(0);
    svg.innerHTML='';
    // profit / loss fills
    const gPts=[], rPts=[];
    for(let i=0;i<=N;i++){ const x=px(xs[i],lo,hi);
      gPts.push(x+','+py(Math.max(pls[i],0))); rPts.push(x+','+py(Math.min(pls[i],0))); }
    svg.append(hs('polygon',{points:px(lo,lo,hi)+','+y0+' '+gPts.join(' ')+' '+px(hi,lo,hi)+','+y0, fill:'rgba(47,191,113,.16)'}));
    svg.append(hs('polygon',{points:px(lo,lo,hi)+','+y0+' '+rPts.join(' ')+' '+px(hi,lo,hi)+','+y0, fill:'rgba(229,72,77,.16)'}));
    // zero line
    svg.append(hs('line',{x1:padL,x2:W-padR,y1:y0,y2:y0,stroke:'#2a3344','stroke-width':1.2}));
    // expiry P/L line (colored by sign, drawn as one path)
    let d='';
    for(let i=0;i<=N;i++){ d += (i?'L':'M')+px(xs[i],lo,hi).toFixed(1)+' '+py(pls[i]).toFixed(1)+' '; }
    svg.append(hs('path',{d, fill:'none', stroke:'#e6e9f0','stroke-width':2.6,'stroke-linejoin':'round'}));
    // today curve
    if(state.dte>0 && opts.showToday!==false){
      let dt='';
      for(let i=0;i<=N;i+=2){ const v=todayPL(legs, xs[i], state.dte, state.iv);
        dt += (i?'L':'M')+px(xs[i],lo,hi).toFixed(1)+' '+py(v).toFixed(1)+' '; }
      svg.append(hs('path',{d:dt, fill:'none', stroke:'#60a5fa','stroke-width':1.8,'stroke-dasharray':'5 4', opacity:.9}));
    }
    // break-evens
    for(let i=1;i<=N;i++){
      if((pls[i-1]<0)!==(pls[i]<0) && pls[i-1]!==pls[i]){
        const f = -pls[i-1]/(pls[i]-pls[i-1]); const bx = xs[i-1]+(xs[i]-xs[i-1])*f;
        const X = px(bx,lo,hi);
        svg.append(hs('circle',{cx:X,cy:y0,r:4.5,fill:'#d4a72c',stroke:'#0b0e14','stroke-width':1.5}));
        svg.append(hs('text',{x:X,y:y0-9,'text-anchor':'middle',fill:'#d4a72c','font-size':11,'font-weight':800},'$'+bx.toFixed(bx<10?2:0)));
      }
    }
    // spot line
    if(spot>=lo&&spot<=hi){
      const X=px(spot,lo,hi);
      svg.append(hs('line',{x1:X,x2:X,y1:padT-6,y2:H-padB,stroke:'#8a93a6','stroke-width':1.2,'stroke-dasharray':'3 3'}));
      svg.append(hs('text',{x:X,y:padT-4,'text-anchor':'middle',fill:'#8a93a6','font-size':10.5,'font-weight':700},'now $'+spot.toFixed(0)));
    }
    // marker (scrub target from toys)
    if(state.marker!==undefined && state.marker>=lo && state.marker<=hi){
      const X=px(state.marker,lo,hi), v=expiryPL(legs,state.marker);
      svg.append(hs('line',{x1:X,x2:X,y1:padT,y2:H-padB,stroke:'#3b82f6','stroke-width':1.6}));
      svg.append(hs('circle',{cx:X,cy:py(v),r:5.5,fill:'#3b82f6',stroke:'#fff','stroke-width':1.6}));
      const lab = fmtPL(v);
      const tx = clamp(X, 44, W-44);
      svg.append(hs('text',{x:tx,y:py(v)-12,'text-anchor':'middle',fill:v>=0?'#2fbf71':'#e5484d','font-size':13,'font-weight':900},lab+' at $'+state.marker.toFixed(0)));
    }
    // x labels
    for(const p of [lo+(hi-lo)*0.12, spot, hi-(hi-lo)*0.12]){
      svg.append(hs('text',{x:px(p,lo,hi),y:H-8,'text-anchor':'middle',fill:'#5b6374','font-size':10.5},'$'+p.toFixed(0)));
    }
    // profit/loss captions
    svg.append(hs('text',{x:W-padR-2,y:y0-7,'text-anchor':'end',fill:'#2fbf71','font-size':10,'font-weight':800},'PROFIT ▲'));
    svg.append(hs('text',{x:W-padR-2,y:y0+14,'text-anchor':'end',fill:'#e5484d','font-size':10,'font-weight':800},'▼ LOSS'));
  }
  // scrub interaction
  let scrubbing=false;
  function scrub(ev){
    if(!st) return;
    const r = svg.getBoundingClientRect();
    const fx = (ev.clientX-r.left)/r.width*W;
    let lo,hi;
    if(st.range){ [lo,hi]=st.range; } else {
      const ks = st.legs.filter(l=>l.type!=='stock').map(l=>l.strike);
      const ref = ks.length? ks.concat([st.spot]) : [st.spot];
      const mn=Math.min.apply(0,ref), mx=Math.max.apply(0,ref);
      const span=Math.max(mx-mn, st.spot*0.22); lo=Math.max(mn-span*0.75,0.01); hi=mx+span*0.75;
    }
    const p = clamp(lo + (fx-padL)/(W-padL-padR)*(hi-lo), lo, hi);
    update(Object.assign({},st,{marker:round2(p)}));
    if(opts.onScrub) opts.onScrub(round2(p));
  }
  svg.addEventListener('pointerdown',e=>{scrubbing=true;svg.setPointerCapture(e.pointerId);scrub(e);});
  svg.addEventListener('pointermove',e=>{if(scrubbing)scrub(e);});
  svg.addEventListener('pointerup',()=>scrubbing=false);
  return {el, update, svg};
}
function todayPL(legs, X, dte, iv){
  let pl=0;
  for(const l of legs){
    if(l.type==='stock'){ pl += l.side*(X-l.premium)*l.qty; continue; }
    pl += l.side*(bsPrice(l.type,X,l.strike,Math.max(dte,0)/252,iv)-l.premium)*l.qty*100;
  }
  return pl;
}

// ---- price chart (SVG) ----------------------------------------
// priceChart() -> {el, update(hist, {strike?, flags?:{idx:emoji}, dayOffset?})}
function priceChart(opts){
  opts = opts||{};
  const W=460, H=opts.height||170, padL=8,padR=42,padT=12,padB=20;
  const svg = hs('svg',{viewBox:'0 0 '+W+' '+H, style:'width:100%;height:auto;display:block;'});
  const el = h('div',{cls:'card sub',style:{padding:'8px 10px'}}, svg);
  function update(hist, o){
    o = o||{};
    svg.innerHTML='';
    const n = hist.length;
    let mn = Math.min.apply(0,hist), mx = Math.max.apply(0,hist);
    if(o.strike){ mn=Math.min(mn,o.strike); mx=Math.max(mx,o.strike); }
    const pad = Math.max((mx-mn)*0.18, mx*0.012); mn-=pad; mx+=pad;
    const X = i => n<2? W/2 : padL + i/(Math.max(n-1, o.minDays||9))*(W-padL-padR);
    const Y = v => padT + (mx-v)/(mx-mn)*(H-padT-padB);
    // strike line
    if(o.strike){
      svg.append(hs('line',{x1:padL,x2:W-padR+16,y1:Y(o.strike),y2:Y(o.strike),stroke:'#d4a72c','stroke-width':1.3,'stroke-dasharray':'6 4',opacity:.85}));
      svg.append(hs('text',{x:W-2,y:Y(o.strike)+4,'text-anchor':'end',fill:'#d4a72c','font-size':11,'font-weight':800},'K $'+o.strike));
    }
    // area + line
    let d='', da='';
    for(let i=0;i<n;i++){ d += (i?'L':'M')+X(i).toFixed(1)+' '+Y(hist[i]).toFixed(1)+' '; }
    da = d + 'L'+X(n-1).toFixed(1)+' '+(H-padB)+' L'+X(0).toFixed(1)+' '+(H-padB)+' Z';
    const up = hist[n-1]>=hist[0];
    const col = up?'#2fbf71':'#e5484d';
    svg.append(hs('path',{d:da, fill:up?'rgba(47,191,113,.12)':'rgba(229,72,77,.12)'}));
    svg.append(hs('path',{d, fill:'none', stroke:col,'stroke-width':2.4,'stroke-linejoin':'round','stroke-linecap':'round'}));
    // flags (events)
    if(o.flags) for(const idx in o.flags){
      if(idx<n) svg.append(hs('text',{x:X(+idx),y:Y(hist[idx])-10,'text-anchor':'middle','font-size':14},o.flags[idx]));
    }
    // last dot + price
    svg.append(hs('circle',{cx:X(n-1),cy:Y(hist[n-1]),r:4.5,fill:col,stroke:'#0b0e14','stroke-width':1.5}));
    svg.append(hs('text',{x:W-2,y:Y(hist[n-1])-8,'text-anchor':'end',fill:col,'font-size':13,'font-weight':900},'$'+hist[n-1].toFixed(2)));
    // day labels
    svg.append(hs('text',{x:padL+2,y:H-6,fill:'#5b6374','font-size':10.5},'day '+(o.day0!==undefined?o.day0:0)));
    if(n>1) svg.append(hs('text',{x:X(n-1),y:H-6,'text-anchor':'middle',fill:'#5b6374','font-size':10.5},'day '+((o.day0||0)+n-1)));
  }
  return {el, update};
}

// ---- option chain ---------------------------------------------
// chainTable({S, iv, dte, strikes, greeks, showIV, onPick(type,strike,q), side})
function chainTable(c){
  const T = c.dte/252;
  const rows = [];
  const head = h('tr',{cls:'hdrow'});
  const cols = c.greeks? ['Δ','Θ/day','Ask'] : ['Ask'];
  for(const x of cols) head.append(h('th',{},x==='Ask'?'Call':x));
  head.append(h('th',{},'Strike'));
  for(const x of cols.slice().reverse()) head.append(h('th',{},x==='Ask'?'Put':x));
  rows.push(head);
  for(const K of c.strikes){
    const qc = quote('call',c.S,K,T,c.iv), qp = quote('put',c.S,K,T,c.iv);
    const dc = bsDelta('call',c.S,K,T,c.iv), dp = bsDelta('put',c.S,K,T,c.iv);
    const tc = bsThetaDay('call',c.S,K,T,c.iv), tp = bsThetaDay('put',c.S,K,T,c.iv);
    const tr = h('tr',{cls:(K<c.S?'itmC':'')+(K>c.S?' itmP':'')});
    const cCell = txt=>h('td',{cls:'c num'},txt), pCell = txt=>h('td',{cls:'p num'},txt);
    if(c.greeks){ tr.append(cCell(dc.toFixed(2))); tr.append(cCell(tc.toFixed(2))); }
    const callBtn = cCell(fmt$(qc.ask)); callBtn.style.fontWeight='800'; callBtn.style.color='#dbe2ee';
    tr.append(callBtn);
    tr.append(h('td',{cls:'strike num'},'$'+K));
    const putBtn = pCell(fmt$(qp.ask)); putBtn.style.fontWeight='800'; putBtn.style.color='#dbe2ee';
    tr.append(putBtn);
    if(c.greeks){ tr.append(pCell(tp.toFixed(2))); tr.append(pCell(dp.toFixed(2))); }
    tr.addEventListener('click', ev=>{
      // clicked side = call if x left of strike col center
      const cells = [...tr.children];
      const strikeIdx = c.greeks?2:1;
      let type = 'call';
      const td = ev.target.closest('td');
      if(td){ const i = cells.indexOf(td); if(i> (c.greeks?3:1)) type='put'; if(i===(c.greeks?3:1)) type = null; }
      if(type===null) return;
      c.onPick(type, K, type==='call'?qc:qp);
    });
    rows.push(tr);
  }
  const tbl = h('table',{cls:'chain'}, rows);
  const wrap = h('div',{cls:'card sub',style:{padding:'6px 8px',overflowX:'auto'}}, tbl);
  if(c.showIV) wrap.append(h('div',{cls:'center dim',style:{fontSize:'12px',padding:'6px 0 2px'}},'IV: ',h('b',{cls:'gold num'},Math.round(c.iv*100)+'%'),'  ·  '+c.dte+' days to expiry  ·  tap a call or put price to trade'));
  else wrap.append(h('div',{cls:'center dim',style:{fontSize:'12px',padding:'6px 0 2px'}},c.dte+' days to expiry · tap a call or put price to trade'));
  return wrap;
}
function strikesAround(S, step, n){
  const base = Math.round(S/step)*step, out=[];
  for(let i=-n;i<=n;i++) out.push(round2(base+i*step));
  return out;
}

// ---- quiz ------------------------------------------------------
function comboMult(c){ return c>=4?2 : c>=2?1.5 : 1; }
function renderQuiz(box, step, ctx, next){
  let qi = 0;
  let comboEl = null;
  function showCombo(){
    if(comboEl) comboEl.remove(); comboEl=null;
    if(ctx.combo>=2){ comboEl = h('div',{cls:'combo num'},'×'+comboMult(ctx.combo)+' streak bonus'); document.body.append(comboEl); }
  }
  function renderQ(){
    box.innerHTML='';
    if(comboEl){comboEl.remove();comboEl=null;}
    const item = step.q[qi];
    if(!item){ next(); return; }
    showCombo();
    box.append(h('div',{cls:'tag',style:{margin:'8px 0'}},(step.name||'QUICK CHECK')+' · '+(qi+1)+' / '+step.q.length));
    box.append(h('div',{cls:'card',style:{fontSize:'16px',fontWeight:700,lineHeight:1.45}},h('span',{html:item.q})));
    let firstTry = true, answered = false;
    ctx.quizTotal++;
    if(item.input!==undefined){ // numeric answer
      const inp = h('input',{type:'number',step:'0.01',placeholder:'$',style:{width:'100%',padding:'14px',fontSize:'18px',borderRadius:'12px',border:'1.5px solid var(--line)',background:'var(--card)',color:'var(--ink)',fontWeight:800}});
      const chk = h('button',{cls:'btn primary',style:{marginTop:'10px'},onclick:()=>{
        const v = parseFloat(inp.value);
        if(isNaN(v)) return;
        if(Math.abs(v-item.input)<= (item.tol||0.5)) correct(firstTry, chk);
        else { wrong(inp); firstTry=false; }
      }},'Check');
      box.append(inp, chk);
    } else {
      for(let i=0;i<item.a.length;i++){
        const btn = h('button',{cls:'qopt',html:item.a[i]});
        btn.addEventListener('click',()=>{
          if(i===item.c){
            btn.classList.add('right');
            [...box.querySelectorAll('.qopt')].forEach(b=>b.disabled=true);
            correct(firstTry, btn);
          } else { btn.classList.add('wrong'); btn.disabled=true; wrong(btn); firstTry=false; }
        });
        box.append(btn);
      }
    }
    function correct(first, anchor){
      if(answered) return; answered = true;
      anchor.disabled = true;
      if(first){ ctx.quizFirst++; ctx.combo++; }
      const xp = Math.round((first?10:5)*comboMult(ctx.combo));
      const r = anchor.getBoundingClientRect();
      addXP(xp, r.right-60, r.top);
      showCombo();
      if(item.why) box.append(h('div',{cls:'why',html:''+item.why}));
      box.append(contBtn(qi+1<step.q.length?'Next question':'Continue', ()=>{ qi++; renderQ(); }));
    }
    function wrong(el){
      ctx.combo=0; showCombo();
      el.classList.add('shake'); setTimeout(()=>el.classList.remove('shake'),500);
      if(navigator.vibrate) navigator.vibrate(60);
    }
  }
  renderQ();
}

// ---- trade runner ---------------------------------------------
// cfg: {ticker,S0,iv,path,ivPath?,noise?,seed?,dte,cash?,brief,choices:[{label,sub,legs,note?}],
//       allowSell?, par?, flags?, resolveNote?, ownShares?}
function buildLegs(rawLegs, Snow, iv, dteDefault){
  return rawLegs.map(rl=>{
    const dte0 = rl.dte!==undefined?rl.dte:dteDefault;
    let prem;
    if(rl.type==='stock') prem = Snow;
    else { const q = quote(rl.type, Snow, rl.strike, dte0/252, iv); prem = rl.side>0? q.ask : q.bid; }
    return Object.assign({}, rl, {premium:prem, dte0});
  });
}
function posStats(legs, spot){
  // numeric max gain/loss with unlimited detection
  const ks = legs.filter(l=>l.type!=='stock').map(l=>l.strike);
  const ref = ks.length?ks.concat([spot]):[spot];
  const lo = Math.max(Math.min.apply(0,ref)*0.4, 0.01), hi = Math.max.apply(0,ref)*2.2;
  let mx=-1e15, mn=1e15;
  for(let i=0;i<=260;i++){ const v = expiryPL(legs, lo+(hi-lo)*i/260); mx=Math.max(mx,v); mn=Math.min(mn,v); }
  const slopeHi = expiryPL(legs,hi) - expiryPL(legs,hi*0.98);
  const slopeLo = expiryPL(legs,lo*1.02) - expiryPL(legs,lo);
  const gUnl = slopeHi>1;             // rises to the right forever
  const lUnlHi = slopeHi<-1;          // falls to the right forever
  const lUnlLo = slopeLo>1;           // falls toward zero (left)
  return {
    maxGain: gUnl? null : round2(mx),
    maxLoss: lUnlHi? null : round2(mn),
    bigDownRisk: lUnlLo,
  };
}
function bes(legs, spot){
  const ks = legs.filter(l=>l.type!=='stock').map(l=>l.strike);
  const ref = ks.length?ks.concat([spot]):[spot];
  const lo=Math.max(Math.min.apply(0,ref)*0.4,0.01), hi=Math.max.apply(0,ref)*2.2, out=[];
  let prev = expiryPL(legs,lo), prevP = lo;
  for(let i=1;i<=500;i++){ const p = lo+(hi-lo)*i/500, v=expiryPL(legs,p);
    if((prev<0)!==(v<0) && v!==prev) out.push(round2(prevP + (p-prevP)*(-prev/(v-prev))));
    prev=v; prevP=p; }
  return out;
}
function settlePL(legs, S){
  return round2(legs.reduce((a,l)=>{
    if(l.type==='stock') return a + l.side*(S-l.premium)*l.qty;
    const intr = l.type==='call'?Math.max(S-l.strike,0):Math.max(l.strike-S,0);
    return a + l.side*(intr-l.premium)*l.qty*100;
  },0));
}

function tradeRunner(box, cfg, ctx, done){
  const m = ScenarioMarket(cfg);
  const info = TICKERS[cfg.ticker];
  let legs = null, resolved = false;
  const dia = payoffDiagram({});
  const chart = priceChart({});

  function markPL(){
    return round2(legs.reduce((a,l)=> a + legPL(l, m.S, Math.max(l.dte0 - m.day, 0), m.iv), 0));
  }
  // ---------- phase 1: briefing + choice ----------
  function renderChoose(){
    box.innerHTML='';
    box.append(h('div',{cls:'tag',style:{margin:'8px 0'}},'TRADE BRIEFING · '+cfg.ticker+' $'+m.S.toFixed(2)));
    const wrap = h('div',{cls:'cols2'}), colL = h('div'), colR = h('div');
    wrap.append(colL,colR); box.append(wrap);
    colL.append(mentorEl(cfg.brief, cfg.pose||'think'));
    const choiceBox = colR;
    for(const c of cfg.choices){
      const built = buildLegs(c.legs, m.S, m.iv, cfg.dte);
      const cost = posEntryCost(built);
      const card = h('div',{cls:'card',style:{cursor:'pointer'}},
        h('div',{style:{fontWeight:900,fontSize:'15.5px'}},c.label),
        c.sub? h('div',{cls:'dim',style:{fontSize:'13.5px',margin:'4px 0'}},c.sub):null,
        h('div',{},built.map(l=>h('span',{cls:'chip'},legLabel(l)+(l.type!=='stock'?' @ '+fmt$(l.premium):''))),
          h('span',{cls:'chip '+(cost>=0?'red':'green')}, cost>=0? 'Cost '+fmt$(cost) : 'Credit '+fmt$(-cost))));
      card.addEventListener('click',()=>renderTicket(c, built));
      choiceBox.append(card);
    }
  }
  // ---------- phase 2: ticket ----------
  function renderTicket(choice, built){
    const cost = posEntryCost(built);
    const stats = posStats(built, m.S);
    const back = h('div',{cls:'sheet-back',onclick:closeSheet});
    const sheet = h('div',{cls:'sheet'});
    function closeSheet(){ back.remove(); sheet.remove(); }
    sheet.append(h('h3',{},'Order ticket'),
      h('div',{cls:'dim',style:{fontSize:'13px',marginBottom:'8px'}},cfg.ticker+' at $'+m.S.toFixed(2)+' · options control 100 shares each'));
    for(const l of built) sheet.append(h('div',{cls:'legrow'},h('span',{},legLabel(l)),h('span',{cls:'num'},l.type==='stock'?fmt$(l.premium)+'/sh':fmt$(l.premium)+' ×100')));
    const d2 = payoffDiagram({height:200});
    sheet.append(d2.el);
    d2.update({legs:built, spot:m.S, iv:m.iv, dte:cfg.dte});
    const beL = bes(built, m.S);
    sheet.append(h('div',{cls:'card sub',style:{padding:'8px 14px'}},
      statRow(cost>=0?'You pay':'You receive', fmt$(Math.abs(cost)), cost>=0?'red':'green'),
      statRow('Max gain', stats.maxGain===null?'Unlimited':fmt$(stats.maxGain),'green'),
      statRow('Max loss', stats.maxLoss===null?'Uncapped ⚠':(fmt$(Math.abs(stats.maxLoss))+(stats.bigDownRisk?' ⚠':'')),'red'),
      statRow('Break-even'+(beL.length>1?'s':''), beL.length?beL.map(b=>'$'+b.toFixed(2)).join(' & '):'—','gold')));
    sheet.append(h('button',{cls:'btn primary',onclick:()=>{ closeSheet(); legs=built; ctx.choice=choice; renderLive(); }},'CONFIRM TRADE'));
    sheet.append(h('div',{style:{height:'8px'}}));
    sheet.append(h('button',{cls:'btn ghost',onclick:closeSheet},'Cancel'));
    document.body.append(back, sheet);
  }
  // ---------- phase 3: live market ----------
  let lastPL = 0;
  function renderLive(){
    box.innerHTML='';
    const minDte = legs.length? Math.min.apply(0, legs.map(l=>l.dte0)) : cfg.dte;
    const dteNow = Math.max(minDte - m.day, 0);
    box.append(h('div',{cls:'tag',style:{margin:'8px 0'}},'LIVE · '+cfg.ticker+' · day '+m.day+' of '+cfg.path.length));
    const wrap = h('div',{cls:'cols2'}), colL = h('div'), colR = h('div');
    wrap.append(colL,colR); box.append(wrap);
    colL.append(chart.el);
    chart.update(m.hist,{strike: legs.find(l=>l.type!=='stock')?legs.find(l=>l.type!=='stock').strike:null, flags:cfg.flags, minDays:cfg.path.length});
    const pl = markPL();
    const plEl = h('div',{cls:'bignum num '+plClass(pl)},fmtPL(lastPL));
    countUp(plEl, lastPL, pl, fmtPL, 500); lastPL = pl;
    const card = h('div',{cls:'card'},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
        h('div',{},h('div',{cls:'tag'},'YOUR POSITION P/L'), plEl),
        h('div',{cls:'center'},h('div',{cls:'tag'},'EXPIRY'),h('div',{cls:'chip '+(dteNow<=2?'red':'gold'),style:{fontSize:'15px',padding:'6px 12px'}},''+dteNow+'d'))),
      h('div',{style:{marginTop:'8px'}}, legs.map(l=>{
        const dl = Math.max(l.dte0-m.day,0);
        const lp = legPL(l, m.S, dl, m.iv);
        return h('div',{cls:'poscard'},
          h('div',{cls:'top'},h('span',{},legLabel(l)),h('span',{cls:'num '+plClass(lp)},fmtPL(lp))));
      })));
    colR.append(card);
    if(cfg.showGreeks && legs.some(l=>l.type!=='stock')){
      const l0 = legs.find(l=>l.type!=='stock');
      const dl = Math.max(l0.dte0-m.day,0)/252;
      colR.append(h('div',{cls:'card sub',style:{padding:'8px 14px'}},
        statRow('Delta','' + (l0.side*bsDelta(l0.type,m.S,l0.strike,dl,m.iv)*l0.qty).toFixed(2)),
        statRow('Theta (per day)', fmt$(l0.side*bsThetaDay(l0.type,m.S,l0.strike,dl,m.iv)*100*l0.qty),'red'),
        statRow('IV', Math.round(m.iv*100)+'%','gold')));
    }
    const row = h('div',{cls:'btnrow'});
    row.append(h('button',{cls:'btn primary',onclick:()=>{ m.step(); checkResolve(); }},'Advance 1 day'));
    if(cfg.allowSell!==false && dteNow>0)
      row.append(h('button',{cls:'btn ghost',onclick:()=>resolve('sold')},'Sell now'));
    colR.append(row);
    if(cfg.liveNote) colL.append(h('div',{cls:'dim center',style:{fontSize:'12.5px'}},cfg.liveNote));
  }
  function checkResolve(){
    const minDte = legs.length? Math.min.apply(0, legs.map(l=>l.dte0)) : cfg.dte;
    if(minDte - m.day <= 0) resolve('expired');
    else if(m.done()) resolve(cfg.allowSell===false?'expired':'auto');
    else renderLive();
  }
  // ---------- phase 4: result ----------
  function resolve(how){
    if(resolved) return; resolved = true;
    let pl;
    if(how==='expired') pl = settlePL(legs, m.S);
    else pl = markPL();
    // alt-choice comparison (what the other choices would have made, held the same way)
    const alts = cfg.choices.length>1 ? cfg.choices.map(c=>{
      const bl = buildLegs(c.legs, cfg.S0, cfg.iv, cfg.dte);
      const apl = (how==='expired')? settlePL(bl, m.S) : round2(bl.reduce((a,l)=>a+legPL(l,m.S,Math.max(l.dte0-m.day,0),m.iv),0));
      return {label:c.label, pl:apl, chosen:c===ctx.choice};
    }) : null;
    const result = {pl, S:m.S, day:m.day, how, alts, legs, iv:m.iv};
    ctx.plTotal = round2(ctx.plTotal + pl);
    ctx.results.push(result);
    ctx.last = result;
    box.innerHTML='';
    box.append(h('div',{cls:'tag',style:{margin:'8px 0'}},'SCENARIO COMPLETE'));
    const wrap = h('div',{cls:'cols2'}), colL = h('div'), colR = h('div');
    wrap.append(colL,colR); box.append(wrap);
    chart.update(m.hist,{strike: legs.find(l=>l.type!=='stock')?legs.find(l=>l.type!=='stock').strike:null, flags:cfg.flags});
    colL.append(chart.el);
    const big = h('div',{cls:'bignum num center '+plClass(pl)},fmtPL(0));
    countUp(big, 0, pl, fmtPL, 900);
    const howTxt = legs.length===0 ? 'You stayed in cash. Zero drama.' :
      {sold:'You sold your position.', auto:'Scenario over — position closed at market.',
      expired: legs.every(l=>l.type==='stock'||((l.type==='call'?m.S-l.strike:l.strike-m.S)<=0)) ? 'Options expired worthless.' : 'Expiry — settled at intrinsic value.'}[how];
    colR.append(h('div',{cls:'card center'}, h('div',{cls:'tag'},'FINAL P/L'), big,
      h('div',{cls:'dim',style:{fontSize:'13.5px',marginTop:'6px'}}, howTxt+' '+cfg.ticker+' finished at $'+m.S.toFixed(2)+'.')));
    if(alts){
      const list = h('div',{cls:'card'}, h('div',{cls:'tag',style:{marginBottom:'6px'}},'HOW EVERY CHOICE DID'));
      for(const a of alts.slice().sort((x,y)=>y.pl-x.pl))
        list.append(h('div',{cls:'statrow'},h('span',{cls:'k'},(a.chosen?'▸ ':'')+a.label),h('span',{cls:'v num '+plClass(a.pl)},fmtPL(a.pl))));
      colR.append(list);
    }
    colR.append(contBtn('Continue', done));
  }
  renderChoose();
}

// ---- level completion -----------------------------------------
const TIER_AFTER = {'1-7':1,'2-4':2,'3-5':3,'4-4':4};
function finishLevel(scr, ctx){
  scr.classList.remove('wide');
  const lvl = ctx.lvl;
  const quizOK = ctx.quizTotal===0 || (ctx.quizFirst/ctx.quizTotal)>=0.8;
  const par = lvl.par!==undefined? lvl.par : 0;
  const plOK = ctx.plTotal>=par;
  const stars = 1 + (quizOK?1:0) + (plOK?1:0);
  const prev = S.levels[lvl.id] || {stars:0, bestPL:-1e9, completed:false};
  const firstTime = !prev.completed;
  let xpGain = 0;
  if(firstTime) xpGain += 50;
  if(stars>prev.stars) xpGain += (stars-prev.stars)*25;
  S.levels[lvl.id] = {completed:true, stars:Math.max(stars,prev.stars), bestPL:Math.max(ctx.plTotal, prev.bestPL)};
  let tierMsg = null;
  if(TIER_AFTER[lvl.id] && S.sandbox.tier < TIER_AFTER[lvl.id]){
    S.sandbox.tier = TIER_AFTER[lvl.id];
    tierMsg = 'Sandbox upgraded — '+tierName(S.sandbox.tier)+'!';
  }
  if(xpGain) S.xp += xpGain;
  save();
  confettiBurst(true);
  const body = scr.querySelector('.prog').nextSibling || scr;
  scr.innerHTML='';
  scr.append(hudEl({back:()=>go('map')}));
  const starsEl = h('div',{style:{fontSize:'44px',letterSpacing:'6px',margin:'6px 0'},cls:'gold center'},'');
  scr.append(h('div',{cls:'center',style:{paddingTop:'20px'}},
    h('div',{html:owlSVG(stars>=3?'cool':'happy'),style:{display:'inline-block',transform:'scale(1.2)'}}),
    h('h2',{style:{fontSize:'26px',margin:'10px 0 2px'}},'Level complete!'),
    h('div',{cls:'dim'},lvl.title), starsEl));
  let si=0; const iv2 = setInterval(()=>{ si++; starsEl.textContent = '★'.repeat(Math.min(si,stars))+'☆'.repeat(3-Math.min(si,stars)); if(si>=3) clearInterval(iv2); }, 320);
  const card = h('div',{cls:'card'},
    statRow('Quiz accuracy', ctx.quizTotal? Math.round(ctx.quizFirst/ctx.quizTotal*100)+'% first try'+(quizOK?' ✓':'') : '—'),
    statRow('Scenario P/L', fmtPL(ctx.plTotal)+(plOK?' ✓':''), plClass(ctx.plTotal)),
    statRow('XP earned', '+'+xpGain+''),
    statRow('Rank', rankFor(S.xp),'gold'));
  scr.append(card);
  if(tierMsg) scr.append(h('div',{cls:'card',style:{borderColor:'var(--accent)'}},h('div',{style:{fontWeight:800}},tierMsg)));
  const idx = LEVELS.indexOf(lvl);
  const nextLvl = LEVELS[idx+1];
  if(nextLvl) scr.append(h('button',{cls:'btn primary',onclick:()=>go('lesson',{id:nextLvl.id})},'Next: '+nextLvl.title));
  scr.append(h('div',{style:{height:'10px'}}));
  scr.append(h('button',{cls:'btn ghost',onclick:()=>go('map')},'Back to the floor'));
  if(tierMsg) scr.append(h('div',{style:{height:'10px'}}), h('button',{cls:'btn ghost',onclick:()=>go('sandbox')},'Try the Sandbox'));
}

// 2.2 — theta melt lab
TOYS.thetamelt = (box, step, ctx, next)=>{
  toyTag(box,'THE MELTING MACHINE');
  const S=50, iv=0.6; let day=0;
  const D1=30, D2=7;
  const p0a = bsPrice('call',S,50,D1/252,iv), p0b = bsPrice('call',S,50,D2/252,iv);
  const histA=[p0a], histB=[p0b];
  const btn = gateBtn(next);
  const W=460,H=180,padL=8,padR=60,padT=14,padB=22;
  const svg = hs('svg',{viewBox:'0 0 '+W+' '+H,style:'width:100%;height:auto;display:block;'});
  const read = h('div',{cls:'card sub',style:{padding:'8px 14px'}});
  function draw(){
    svg.innerHTML='';
    const mx = p0a*1.08;
    const X=i=>padL+i/D2*(W-padL-padR), Y=v=>padT+(mx-v)/mx*(H-padT-padB);
    for(const [hist,col,name] of [[histA,'#60a5fa','30-day call'],[histB,'#e5484d','7-day call']]){
      let d='';
      for(let i=0;i<hist.length;i++) d+=(i?'L':'M')+X(i).toFixed(1)+' '+Y(hist[i]).toFixed(1)+' ';
      svg.append(hs('path',{d,fill:'none',stroke:col,'stroke-width':2.6,'stroke-linecap':'round'}));
      const last=hist[hist.length-1];
      svg.append(hs('circle',{cx:X(hist.length-1),cy:Y(last),r:4,fill:col}));
      svg.append(hs('text',{x:X(hist.length-1)+6,y:Y(last)+4,fill:col,'font-size':11,'font-weight':800},'$'+last.toFixed(2)));
    }
    svg.append(hs('text',{x:padL,y:H-6,fill:'#5b6374','font-size':10.5},'day '+day+' — PLTR stuck at $50'));
    read.innerHTML='';
    const la=histA[histA.length-1], lb=histB[histB.length-1];
    read.append(
      statRow('30-day $50 call', fmt$(la)+'  ('+fmtPL(round2((la-p0a)*100))+')', la<p0a?'red':''),
      statRow('7-day $50 call', fmt$(lb)+'  ('+fmtPL(round2((lb-p0b)*100))+')', lb<p0b?'red':''));
    if(day>0) read.append(statRow('Lost TODAY (7d vs 30d)', fmt$( Math.abs(round2((histB[day-1]-lb)*100)) )+' vs '+fmt$( Math.abs(round2((histA[day-1]-la)*100)) ),'red'));
  }
  box.append(h('div',{cls:'card sub',style:{padding:'8px 10px'}},svg), read,
    h('button',{cls:'btn primary',onclick:()=>{
      if(day>=D2) return;
      day++;
      histA.push(bsPrice('call',S,50,(D1-day)/252,iv));
      histB.push(bsPrice('call',S,50,Math.max(D2-day,0)/252,iv));
      draw();
      if(day>=5) btn.disabled=false;
      if(day>=D2) toast('The 7-day call just expired worthless');
    }},'Advance 1 Day (stock stays flat)'), btn);
  draw();
};

// 2.4 — chain scavenger hunt
TOYS.chainhunt = (box, step, ctx, next)=>{
  toyTag(box,'CHAIN SCAVENGER HUNT');
  const S=50, iv=0.55, dte=14, strikes=strikesAround(50,2.5,3);
  const T = dte/252;
  const tasks = [
    {q:'Tap the <b>CALL with delta closest to 0.50</b> (the coin-flip option).',
     ok:(t,K)=>t==='call' && Math.abs(bsDelta('call',S,K,T,iv)-0.5)===Math.min.apply(0,strikes.map(k=>Math.abs(bsDelta('call',S,k,T,iv)-0.5))),
     why:'The at-the-money call has delta ≈ 0.50 — the market says it\'s a coin flip whether it finishes in the money.'},
    {q:'Tap the option (call side) with the <b>most extrinsic value</b> — the most "hope" priced in.',
     ok:(t,K)=>{ const ext = k=>bsPrice('call',S,k,T,iv)-Math.max(S-k,0); return t==='call' && Math.abs(ext(K)-Math.max.apply(0,strikes.map(ext)))<0.01; },
     why:'At-the-money options carry the most extrinsic value — and therefore melt the fastest per day. Theta bites hardest right at the money.'},
    {q:'Tap the <b>deepest in-the-money CALL</b> — the one that behaves most like owning the stock.',
     ok:(t,K)=>t==='call'&&K===Math.min.apply(0,strikes),
     why:'Lowest strike call = deepest ITM = delta near 1. It costs the most but is nearly all intrinsic value — very little hope to melt.'},
  ];
  let ti=0;
  const prompt = h('div',{cls:'card',style:{fontWeight:700,fontSize:'15px'}});
  const fb = h('div');
  const btn = gateBtn(next);
  const chain = chainTable({S, iv, dte, strikes, greeks:true, showIV:true, onPick:(type,K)=>{
    if(ti>=tasks.length) return;
    const t = tasks[ti];
    ctx.quizTotal++;
    if(t.ok(type,K)){
      ctx.quizFirst++; ctx.combo++;
      addXP(Math.round(10*comboMult(ctx.combo)));
      fb.innerHTML=''; fb.append(h('div',{cls:'why',html:''+t.why}));
      ti++;
      if(ti<tasks.length) prompt.innerHTML = (ti+1)+'/'+tasks.length+' — '+tasks[ti].q;
      else { prompt.innerHTML='Hunt complete! You can read a chain.'; btn.disabled=false; }
    } else {
      ctx.combo=0;
      fb.innerHTML=''; fb.append(h('div',{cls:'card',style:{borderColor:'var(--red)',color:'var(--red)',fontWeight:700}},'Not that one — look at the '+(ti===0?'Δ column':ti===1?'prices vs intrinsic value':'lowest strike')+'.'));
      prompt.classList.add('shake'); setTimeout(()=>prompt.classList.remove('shake'),500);
    }
  }});
  prompt.innerHTML = '1/'+tasks.length+' — '+tasks[0].q;
  box.append(prompt, chain, fb, btn);
};

// shared multi-series line chart for simulator toys
function simChart(){
  const W=460,H=180,padL=8,padR=8,padT=14,padB=20;
  const svg = hs('svg',{viewBox:'0 0 '+W+' '+H,style:'width:100%;height:auto;display:block;'});
  const el = h('div',{cls:'card sub',style:{padding:'8px 10px'}}, svg);
  function draw(series, opts){ // series: [{data:[], color, label}]
    opts = opts||{};
    svg.innerHTML='';
    let mn=Infinity,mx=-Infinity,len=0;
    for(const s of series){ len=Math.max(len,s.data.length);
      for(const v of s.data){ mn=Math.min(mn,v); mx=Math.max(mx,v); } }
    if(!isFinite(mn)) return;
    const pad=(mx-mn)*0.1||1; mn-=pad; mx+=pad;
    const X=i=>padL+i/Math.max(len-1,1)*(W-padL-padR-70), Y=v=>padT+(mx-v)/(mx-mn)*(H-padT-padB);
    if(opts.zero!==undefined && opts.zero>=mn && opts.zero<=mx)
      svg.append(hs('line',{x1:padL,x2:W-padR,y1:Y(opts.zero),y2:Y(opts.zero),stroke:'#2a3344','stroke-width':1,'stroke-dasharray':'4 4'}));
    for(const s of series){
      let d='';
      for(let i=0;i<s.data.length;i++) d+=(i?'L':'M')+X(i).toFixed(1)+' '+Y(s.data[i]).toFixed(1)+' ';
      svg.append(hs('path',{d,fill:'none',stroke:s.color,'stroke-width':2.2,'stroke-linejoin':'round'}));
      const last=s.data[s.data.length-1];
      svg.append(hs('text',{x:W-padR-2,y:Y(last)+4,'text-anchor':'end',fill:s.color,'font-size':10.5,'font-weight':700},s.label+(opts.fmt?': '+opts.fmt(last):'')));
    }
    if(opts.xlabel) svg.append(hs('text',{x:padL,y:H-5,fill:'#5b6374','font-size':10.5},opts.xlabel));
    if(opts.marks) for(const mk of opts.marks){
      svg.append(hs('line',{x1:X(mk.i),x2:X(mk.i),y1:padT,y2:H-padB,stroke:mk.color||'#d4a72c','stroke-width':1,'stroke-dasharray':'3 3'}));
      svg.append(hs('text',{x:X(mk.i),y:padT-2,'text-anchor':'middle',fill:mk.color||'#d4a72c','font-size':9.5,'font-weight':700},mk.label));
    }
  }
  return {el, draw};
}

// 4.1 — the volatility risk premium simulator
TOYS.vrpsim = (box, step, ctx, next)=>{
  toyTag(box,'THE INSURANCE BUSINESS');
  const btn = gateBtn(next);
  const sc = simChart();
  const read = h('div',{cls:'card sub',style:{padding:'8px 14px'}});
  const run = h('button',{cls:'btn primary'},'Run 26 weeks of the market');
  run.addEventListener('click',()=>{
    const rnd = mulberry32(1104);
    const S0=100, ivSold=0.30, realVol=0.24;
    let seller=[0], buyer=[0];
    for(let w=1;w<=26;w++){
      const straddle = 0.8*S0*ivSold*Math.sqrt(1/52);           // weekly ATM straddle premium (approx)
      let z = gaussOf(rnd);
      if(w===19) z = -3.6;                                       // one ugly surprise week
      const move = Math.abs(z)*realVol*Math.sqrt(1/52)*S0;
      seller.push(round2(seller[w-1] + (straddle - move)*100));
      buyer.push(round2(buyer[w-1] + (move - straddle)*100));
    }
    sc.draw([{data:seller,color:'#2fbf71',label:'seller'},{data:buyer,color:'#e5484d',label:'buyer'}],
      {zero:0,xlabel:'26 weeks · options priced at 30% IV, stock actually moved at 24%',fmt:fmtPL});
    read.innerHTML='';
    read.append(statRow('Implied vol (what options charged)','30%','gold'),
      statRow('Realized vol (what actually happened)','24%'),
      statRow('Seller after 26 weeks', fmtPL(seller[26]), plClass(seller[26])),
      statRow('Buyer after 26 weeks', fmtPL(buyer[26]), plClass(buyer[26])),
      statRow('Note week 19','one bad week gave back months of income','red'));
    btn.disabled=false;
  });
  box.append(h('div',{cls:'card'},
    h('p',{style:{margin:'0 0 10px',fontSize:'14px',lineHeight:1.6}},
      'Every week, one trader sells an at-the-money straddle (collects the premium) and one buys it. Options are priced at 30% implied volatility — but the stock only actually moves at 24%.'),
    run), sc.el, read, btn);
};

// 4.3 — straddle / strangle builder
TOYS.straddle = (box, step, ctx, next)=>{
  toyTag(box,'BETTING ON MOVEMENT ITSELF');
  const S0=50, iv=0.55, dte=10;
  let width=0;
  const btn = gateBtn(next);
  const dia = payoffDiagram({});
  const read = h('div',{cls:'card sub',style:{padding:'8px 14px'}});
  function upd(){
    const Kc = 50+width*2.5, Kp = 50-width*2.5;
    const qc=quote('call',S0,Kc,dte/252,iv), qp=quote('put',S0,Kp,dte/252,iv);
    const legs=[{type:'call',side:1,strike:Kc,qty:1,premium:qc.ask},{type:'put',side:1,strike:Kp,qty:1,premium:qp.ask}];
    dia.update({legs, spot:S0, iv, dte, range:[38,62]});
    const cost=round2(qc.ask+qp.ask);
    read.innerHTML='';
    read.append(statRow(width===0?'Straddle (both at $50)':'Strangle ($'+Kp+' put / $'+Kc+' call)',''),
      statRow('Total cost', fmt$(cost*100),'red'),
      statRow('Break-evens', '$'+(Kp-cost).toFixed(2)+'  &  $'+(Kc+cost).toFixed(2),'gold'),
      statRow('Move needed by expiry', '±'+(((Kc+cost)/S0-1)*100).toFixed(1)+'%'),
      statRow('Direction needed','NONE — up or down both pay','green'));
    btn.disabled=false;
  }
  box.append(dia.el, h('div',{cls:'card',style:{padding:'10px 16px'}},
    h('div',{cls:'tag'},'STRIKE WIDTH (0 = straddle, wider = cheaper strangle)'),
    slider(0,3,0,1,v=>{width=v;upd();})), read, btn);
  upd();
};

// 4.4 — iron condor builder
TOYS.condor = (box, step, ctx, next)=>{
  toyTag(box,'THE RANGE BET — IRON CONDOR');
  const S0=100, iv=0.25, dte=15;
  let dist=2, wing=1;
  const btn = gateBtn(next);
  const dia = payoffDiagram({});
  const read = h('div',{cls:'card sub',style:{padding:'8px 14px'}});
  function upd(){
    const sp=100-dist*2.5, sc=100+dist*2.5, lp=sp-wing*2.5, lc=sc+wing*2.5;
    const T=dte/252;
    const q=(t,k)=>quote(t,S0,k,T,iv);
    const legs=[
      {type:'put',side:-1,strike:sp,qty:1,premium:q('put',sp).bid},
      {type:'put',side:1,strike:lp,qty:1,premium:q('put',lp).ask},
      {type:'call',side:-1,strike:sc,qty:1,premium:q('call',sc).bid},
      {type:'call',side:1,strike:lc,qty:1,premium:q('call',lc).ask}];
    dia.update({legs, spot:S0, iv, dte:0, range:[86,114]});
    const credit = round2(-posEntryCost(legs));
    const maxLoss = wing*2.5*100 - credit;
    const pop = Math.max(0, Math.round((1 - bsDelta('call',S0,sc,T,iv) - Math.abs(bsDelta('put',S0,sp,T,iv)))*100));
    read.innerHTML='';
    read.append(statRow('Sell $'+sp+' put + $'+sc+' call, buy $'+lp+' / $'+lc+' wings',''),
      statRow('Credit collected', fmt$(credit),'green'),
      statRow('Max loss (defined)', fmt$(maxLoss),'red'),
      statRow('≈ Chance SBUX stays in range', pop+'%','gold'),
      statRow('The seesaw again','wider range → higher odds → smaller credit'));
    btn.disabled=false;
  }
  box.append(dia.el, h('div',{cls:'card',style:{padding:'10px 16px'}},
    h('div',{cls:'tag'},'SHORT STRIKE DISTANCE FROM $100'),
    slider(1,3,2,1,v=>{dist=v;upd();}),
    h('div',{cls:'tag'},'WING WIDTH (your safety net)'),
    slider(1,2,1,1,v=>{wing=v;upd();})), read, btn);
  upd();
};

// 5.1 — expected value simulator
TOYS.evsim = (box, step, ctx, next)=>{
  toyTag(box,'EXPECTED VALUE — THE ONLY SCORE THAT MATTERS');
  const btn = gateBtn(next);
  const sc = simChart();
  const read = h('div',{cls:'card sub',style:{padding:'8px 14px'}});
  let ranA=false, ranB=false;
  const series=[];
  function run(which){
    const rnd = mulberry32(which==='A'?501:502);
    const data=[0];
    for(let i=1;i<=100;i++){
      let pl;
      if(which==='A') pl = rnd()<0.90 ? 20 : -400;   // EV = 0.9*20 - 0.1*400 = -$22/trade
      else            pl = rnd()<0.60 ? 80 : -70;    // EV = 0.6*80 - 0.4*70  = +$20/trade
      data.push(round2(data[i-1]+pl));
    }
    const idx = series.findIndex(s=>s.which===which);
    const entry = {which, data, color:which==='A'?'#e5484d':'#2fbf71', label:which==='A'?'A (wins 90%)':'B (wins 60%)'};
    if(idx>=0) series[idx]=entry; else series.push(entry);
    sc.draw(series,{zero:0,xlabel:'100 trades',fmt:fmtPL});
    if(which==='A') ranA=true; else ranB=true;
    read.innerHTML='';
    read.append(statRow('Strategy A','wins 90% of the time: +$20 win / −$400 loss'),
      statRow('A expected value','0.90×$20 − 0.10×$400 = −$22 per trade','red'),
      statRow('Strategy B','wins 60% of the time: +$80 win / −$70 loss'),
      statRow('B expected value','0.60×$80 − 0.40×$70 = +$20 per trade','green'));
    if(ranA&&ranB) btn.disabled=false;
  }
  box.append(h('div',{cls:'card'},
    h('p',{style:{margin:'0 0 10px',fontSize:'14px',lineHeight:1.6}},'Which strategy would you rather trade — the one that wins 90% of the time, or the one that wins 60%? Run both for 100 trades.'),
    h('div',{cls:'btnrow'},
      h('button',{cls:'btn ghost',onclick:()=>run('A')},'Run A (90% wins)'),
      h('button',{cls:'btn ghost',onclick:()=>run('B')},'Run B (60% wins)'))),
    sc.el, read, btn);
};

// 5.2 — risk of ruin simulator
TOYS.ruinsim = (box, step, ctx, next)=>{
  toyTag(box,'POSITION SIZE — THE RUIN LEVER');
  const btn = gateBtn(next);
  const sc = simChart();
  const read = h('div',{cls:'card sub',style:{padding:'8px 14px'}});
  const run = h('button',{cls:'btn primary'},'Run 60 trades, both sizings');
  run.addEventListener('click',()=>{
    const mk = (frac,seed)=>{
      const rnd = mulberry32(seed); const data=[10000];
      for(let i=1;i<=60;i++){
        const bank = data[i-1];
        if(bank<=500){ data.push(bank); continue; }         // busted — flatline
        const bet = bank*frac;
        data.push(round2(bank + (rnd()<0.55 ? bet : -bet)));
      }
      return data;
    };
    const small = mk(0.04, 77), big = mk(0.40, 77);          // SAME trades, different size
    sc.draw([{data:small,color:'#2fbf71',label:'4% risk'},{data:big,color:'#e5484d',label:'40% risk'}],
      {zero:10000,xlabel:'60 trades · identical strategy (55% win, 1:1) · identical luck',fmt:v=>fmt$(v)});
    read.innerHTML='';
    read.append(
      statRow('Same edge, same coin flips','only the bet size differs'),
      statRow('4% per trade', fmt$(small[60]),'green'),
      statRow('40% per trade', fmt$(big[60]), big[60]<2000?'red':''),
      statRow('Why: drawdown math','−50% needs +100% just to get back to even','red'),
      statRow('Ralph Vince\'s finding','position size, not win rate, drives risk of ruin','gold'));
    btn.disabled=false;
  });
  box.append(h('div',{cls:'card'},
    h('p',{style:{margin:'0 0 10px',fontSize:'14px',lineHeight:1.6}},'Two traders run the same profitable strategy (55% win rate, even payoff) and get the exact same sequence of wins and losses. One risks 4% of the account per trade. The other risks 40%.'),
    run), sc.el, read, btn);
};

// 6.1 — portfolio greeks book
TOYS.bookgreeks = (box, step, ctx, next)=>{
  toyTag(box,'YOUR BOOK, NOT YOUR TRADES');
  const btn = gateBtn(next);
  const read = h('div',{cls:'card sub',style:{padding:'8px 14px'}});
  // a small fixed book
  const positions = [
    {label:'+2 SBUX $100 calls', delta:+0.55*2*100, theta:-14},
    {label:'−1 DIS $75 put (short)', delta:+0.30*100, theta:+6},
    {label:'+1 PLTR $50 put', delta:-0.45*100, theta:-9},
  ];
  const baseDelta = positions.reduce((a,p)=>a+p.delta,0); // ≈ +95
  function upd(hedge){
    const net = Math.round(baseDelta + hedge);
    read.innerHTML='';
    for(const p of positions) read.append(statRow(p.label, 'Δ '+(p.delta>=0?'+':'')+Math.round(p.delta)+' · θ '+p.theta+'/day'));
    read.append(statRow('Stock hedge', hedge+' shares', 'gold'),
      statRow('NET book delta', (net>=0?'+':'')+net+' (≈ '+(net>=0?'long':'short')+' '+Math.abs(net)+' shares)', Math.abs(net)<10?'green':''),
      statRow('NET book theta', '−17/day → the book pays rent',''));
    if(Math.abs(net)<10){ read.append(statRow('Status','DELTA-NEUTRAL — direction no longer matters; you\'re trading volatility and time','green')); btn.disabled=false; }
  }
  box.append(h('div',{cls:'card'},
    h('p',{style:{margin:'0 0 8px',fontSize:'14px',lineHeight:1.6}},'A professional never asks "how is this trade doing?" — they ask "what is my BOOK\'s net exposure?" Add up the deltas below, then hedge with stock until the book stops caring about direction.'),
    h('div',{cls:'tag'},'HEDGE WITH SHARES (negative = short shares)'),
    slider(-150,20,0,5,upd)), read, btn);
  upd(0);
};

// 6.3 — crash / barbell simulator
TOYS.crashsim = (box, step, ctx, next)=>{
  toyTag(box,'PICKING UP PENNIES vs THE STEAMROLLER');
  const btn = gateBtn(next);
  const sc = simChart();
  const read = h('div',{cls:'card sub',style:{padding:'8px 14px'}});
  const run = h('button',{cls:'btn primary'},'Run 36 months');
  run.addEventListener('click',()=>{
    let a=[10000], b=[10000];

      const crash = m===30;
      a.push(round2(a[m-1]*(crash? 0.74 : 1.014)));           // pure short-vol: +1.4%/mo, one −26% month

    sc.draw([{data:a,color:'#e5484d',label:'no hedge'},{data:b,color:'#2fbf71',label:'barbell'}],
      {zero:10000,xlabel:'36 months · month 30: the market falls 20% in days',fmt:v=>fmt$(v)});
    read.innerHTML='';
    read.append(statRow('Strategy A','sell premium, keep every penny, no protection'),
      statRow('Strategy B (Taleb\'s barbell)','same selling, but ~1/3 of the income buys far-OTM index puts'),
      statRow('A after 3 years', fmt$(a[36]),'red'),
      statRow('B after 3 years', fmt$(b[36]),'green'),
      statRow('The lesson','29 smooth months mean nothing if month 30 ends you. Convex protection looks like waste — until it\'s the whole game.','gold'));
    btn.disabled=false;

  box.append(h('div',{cls:'card'},
    h('p',{style:{margin:'0 0 10px',fontSize:'14px',lineHeight:1.6}},'Two premium sellers. Both make steady income. One spends part of it on deep out-of-the-money puts that "always expire worthless." Then month 30 happens.'),
    run), sc.el, read, btn);
};

  toyTag(box,'THE WHEEL — AN INCOME MACHINE');
