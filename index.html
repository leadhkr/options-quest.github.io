      toast('Account reset — fresh $10,000');
      save(); render();
    }},'Reset account ($10,000)'));
    scr.append(h('p',{cls:'footer-note'},'Real tickers, simulated prices (geometric Brownian motion + Black-Scholes) — not live market data. PLTR has surprise earnings. Short puts must be cash-secured; naked calls need a spread (Tier 3).'));
  }
  // ---- strategy template ticket (tier 4) ----
  function openTemplate(kind){
    const tk = sb.tickers[sbTab];
    const K = Math.round(tk.S/2.5)*2.5, w = 2.5;
    let qty = 1;
    const defs = {
      straddle: [{type:'call',side:1,strike:K},{type:'put',side:1,strike:K}],
      strangle: [{type:'call',side:1,strike:K+2*w},{type:'put',side:1,strike:K-2*w}],
      condor:   [{type:'put',side:-1,strike:K-2*w},{type:'put',side:1,strike:K-3*w},{type:'call',side:-1,strike:K+2*w},{type:'call',side:1,strike:K+3*w}],
      putspread:[{type:'put',side:-1,strike:K-w},{type:'put',side:1,strike:K-2*w}],
      callspread:[{type:'call',side:-1,strike:K+w},{type:'call',side:1,strike:K+2*w}],
    };
    const names = {straddle:'Long straddle',strangle:'Long strangle',condor:'Iron condor',putspread:'Put credit spread',callspread:'Call credit spread'};
    const back = h('div',{cls:'sheet-back'});
    const sheet = h('div',{cls:'sheet'});
    const close = ()=>{back.remove();sheet.remove();};
    back.addEventListener('click',close);
    const body = h('div'); sheet.append(body);
    const dia = payoffDiagram({height:180});
    function legsNow(){
      return defs[kind].map(l=>{
        const q = quote(l.type, tk.S, l.strike, sbDte/252, tk.iv);
        return Object.assign({}, l, {qty, premium: l.side>0? q.ask : q.bid, dte0:sbDte, openDay:sb.day});
      });
    }
    function draw(){
      body.innerHTML='';
      const legs = legsNow();
      const debit = posEntryCost(legs);
      const st = posStats(legs, tk.S);
      const locked = debit>=0 ? 0 : (st.maxLoss===null? null : Math.abs(st.maxLoss)*1);
      body.append(h('h3',{},names[kind]+' · '+sbTab+' · '+sbDte+'d'),
        h('div',{cls:'dim',style:{fontSize:'12.5px',marginBottom:'6px'}},sbTab+' at '+fmt$(tk.S)));
      const qr = h('div',{cls:'btnrow'});
      for(const n of [1,2,5]) qr.append(h('button',{cls:'btn small '+(qty===n?'primary':'ghost'),onclick:()=>{qty=n;draw();}},n+'×'));
      body.append(qr);
      for(const l of legs) body.append(h('div',{cls:'legrow'},h('span',{},legLabel(l)),h('span',{cls:'num'},fmt$(l.premium)+' ×100')));
      dia.update({legs, spot:tk.S, iv:tk.iv, dte:sbDte});
      body.append(dia.el);
      body.append(h('div',{cls:'card sub',style:{padding:'8px 14px'}},
        statRow(debit>=0?'You pay':'You receive', fmt$(Math.abs(debit)), debit>=0?'red':'green'),
        locked? statRow('Collateral held', fmt$(locked),'gold'):null,
        statRow('Max gain', st.maxGain===null?'Unlimited':fmt$(st.maxGain),'green'),
        statRow('Max loss', st.maxLoss===null?'Uncapped':fmt$(Math.abs(st.maxLoss)),'red')));
      const need = Math.max(debit,0) + (locked||0);
      if(locked===null) body.append(h('div',{cls:'card',style:{borderColor:'var(--red)',color:'var(--red)',fontWeight:600}},'Undefined risk — not allowed on this desk.'));
      else if(sb.cash < need) body.append(h('div',{cls:'card',style:{borderColor:'var(--red)',color:'var(--red)',fontWeight:600}},'Not enough cash for this trade.'));
      else body.append(h('button',{cls:'btn primary',onclick:()=>{
        const legs2 = legsNow();
        sb.cash = round2(sb.cash - debit - (locked||0));
        const pos = {sym:sbTab, legs:legs2, openDay:sb.day, locked:locked||0,
          label: legs2.map(l=>((l.side>0?'+':'−')+l.qty+' $'+l.strike+(l.type==='call'?'C':'P'))).join(' / ')};
        sb.positions.push(pos);
        sbFeed('Opened '+names[kind].toLowerCase()+' '+pos.label+(debit>=0?' for '+fmt$(debit):' collecting '+fmt$(-debit)));
        save(); close(); toast('Order filled'); render();
      }},'PLACE ORDER'));
      body.append(h('div',{style:{height:'8px'}}),h('button',{cls:'btn ghost',onclick:close},'Cancel'));
    }
    draw();
    document.body.append(back, sheet);
  }
  // ---- ticket ----
  function openTicket(type, K){
    const tk = sb.tickers[sbTab];
    let side = 1, qty = 1, hedgeK = null;
    const back = h('div',{cls:'sheet-back'});
    const sheet = h('div',{cls:'sheet'});
    back.addEventListener('click',()=>{back.remove();sheet.remove();});
    const dia = payoffDiagram({height:180});
    const body = h('div');
    function legsNow(){
      const q = quote(type, tk.S, K, sbDte/252, tk.iv);
      const legs = [{type, side, strike:K, qty, premium: side>0?q.ask:q.bid, dte0:sbDte, openDay:sb.day}];
      if(hedgeK!==null){
        const q2 = quote(type, tk.S, hedgeK, sbDte/252, tk.iv);
        legs.push({type, side:-side, strike:hedgeK, qty, premium: -side>0?q2.ask:q2.bid, dte0:sbDte, openDay:sb.day});
      }
      return legs;
    }
    function calc(legs){
      const debit = posEntryCost(legs); // + = you pay
      let locked = 0, blocked = null;
      if(side<0){
        if(hedgeK!==null) locked = Math.abs(K-hedgeK)*100*qty;              // defined-risk spread
        else if(type==='put') locked = K*100*qty;                            // cash-secured put
        else blocked = 'Naked calls aren\'t allowed on this desk — add a hedge leg (Tier 3) to cap the risk.';
      }
      const need = Math.max(debit,0) + locked - Math.min(debit,0)*0; // credit reduces nothing upfront; keep simple
      return {debit, locked, need, blocked};
    }
    function draw(){
      body.innerHTML='';
      const legs = legsNow();
      const c = calc(legs);
      body.append(h('h3',{},sbTab+' $'+K+' '+(type==='call'?'Call':'Put')+' · '+sbDte+'d'),
        h('div',{cls:'dim',style:{fontSize:'12.5px',marginBottom:'6px'}},sbTab+' at '+fmt$(tk.S)+' · ×100 shares per contract'));
      if(sb.tier>=2){
        const r = h('div',{cls:'btnrow'});
        r.append(h('button',{cls:'btn small '+(side>0?'primary':'ghost'),onclick:()=>{side=1;hedgeK=null;draw();}},'BUY'));
        r.append(h('button',{cls:'btn small '+(side<0?'primary':'ghost'),onclick:()=>{side=-1;draw();}},'SELL'));
        body.append(r);
      }
      const qr = h('div',{cls:'btnrow'});
      for(const n of [1,2,5]) qr.append(h('button',{cls:'btn small '+(qty===n?'primary':'ghost'),onclick:()=>{qty=n;draw();}},n+'×'));
      body.append(qr);
      if(sb.tier>=3){
        const hs2 = h('div',{cls:'btnrow'});
        hs2.append(h('button',{cls:'btn small '+(hedgeK===null?'primary':'ghost'),onclick:()=>{hedgeK=null;draw();}},'Single leg'));
        const off = type==='call'? 5 : -5;
        const hk = round2(K+off);
        hs2.append(h('button',{cls:'btn small '+(hedgeK!==null?'primary':'ghost'),onclick:()=>{hedgeK=hk;draw();}},'Spread w/ $'+hk));
        body.append(hs2);
      }
      dia.update({legs, spot:tk.S, iv:tk.iv, dte:sbDte});
      body.append(dia.el);
      const st = posStats(legs, tk.S);
      body.append(h('div',{cls:'card sub',style:{padding:'8px 14px'}},
        statRow(c.debit>=0?'You pay':'You receive', fmt$(Math.abs(c.debit)), c.debit>=0?'red':'green'),
        c.locked? statRow('Collateral held', fmt$(c.locked),'gold'):null,
        statRow('Max gain', st.maxGain===null?'Unlimited':fmt$(st.maxGain),'green'),
        statRow('Max loss', st.maxLoss===null?'Uncapped ⚠':fmt$(Math.abs(st.maxLoss)),'red'),
        statRow('Cash after', fmt$(round2(sb.cash - Math.max(c.debit,0) + Math.min(c.debit,0)*-1 - c.locked)))));
      if(c.blocked) body.append(h('div',{cls:'card',style:{borderColor:'var(--red)',color:'var(--red)',fontWeight:700,fontSize:'13.5px'}},''+c.blocked));
      else if(sb.cash < Math.max(c.debit,0)+c.locked) body.append(h('div',{cls:'card',style:{borderColor:'var(--red)',color:'var(--red)',fontWeight:700}},'Not enough cash for this trade.'));
      else body.append(h('button',{cls:'btn primary',onclick:()=>{
        const legs2 = legsNow();
        sb.cash = round2(sb.cash - c.debit - c.locked);
        const pos = {sym:sbTab, legs:legs2, openDay:sb.day, locked:c.locked,
          label: legs2.map(l=>((l.side>0?'+':'−')+l.qty+' $'+l.strike+(l.type==='call'?'C':'P'))).join(' / ')};
        sb.positions.push(pos);
        sbFeed('Opened '+pos.label+(c.debit>=0?' for '+fmt$(c.debit):' collecting '+fmt$(-c.debit)));
        save();
        back.remove(); sheet.remove();
        toast('Order filled'); render();
      }},'PLACE ORDER'));
      body.append(h('div',{style:{height:'8px'}}),h('button',{cls:'btn ghost',onclick:()=>{back.remove();sheet.remove();}},'Cancel'));
    }
    sheet.append(body); draw();
    document.body.append(back, sheet);
  }
  build();
};

 d:'Run an option’s market price backwards through the pricing formula and out comes IV — the amount of future movement buyers and sellers have collectively agreed to price in. High IV = expensive options = the market braces for drama. IV is a forecast, and like all forecasts it is often wrong — profitably wrong, if you know which side to take.',
 viz:['iv']},
{t:'Realized volatility', s:'The movement that actually happened.',
 d:'Look back at what the stock really did — that’s realized (or historical) volatility. The entire vol-trading business is comparing the two: if implied (the forecast) persistently exceeds realized (the reality), sellers of options are being overpaid. Which, on average, they are…'},
{t:'Volatility risk premium', s:'IV usually runs above realized — options are systematically a bit overpriced.',
 d:'Across decades and markets, implied volatility exceeds subsequently realized volatility by roughly 3–5 points on average. Why? Options are insurance, and insurers demand profit for bearing tail risk — nobody sells hurricane coverage at cost. This gap is the structural edge behind premium selling… funded by the occasional hurricane actually arriving.',
 viz:['vrp']},
{t:'IV crush', s:'The instant IV collapse after a known event resolves.',
 d:'Before earnings, uncertainty is huge and IV balloons. The second results are out — whatever they are — the uncertainty is gone and IV collapses, often in minutes. Options can lose value even when the stock moves your way, because the vol premium deflates faster than the move adds. The lesson: before an event, ask what move is priced in, not just which direction you expect.',
 ex:'You buy a PLTR call at 90% IV the night before earnings. PLTR gaps UP 4%… IV crashes to 40%, and your call opens LOWER than you paid.'},
{t:'IV rank', s:'Where today’s IV sits in the stock’s own 52-week range (0–100).',
 d:'45% IV means nothing in isolation — panic for a utility, nap-time for a meme stock. IV rank normalizes: (current IV − 52-week low) ÷ (52-week high − low). The professional playbook: IVR above ~50, favor selling premium (it’s rich); below ~25, favor buying (it’s cheap). Always with defined risk — high IV often has a reason.',
 ex:'PLTR’s IV ranged 22–95% this year; today it’s 40%. IVR = (40−22)/(95−22) ≈ 25 — despite the big number, this is CHEAP for PLTR.'},
{t:'Skew (the volatility smirk)', s:'Downside puts carry higher IV than equidistant upside calls.',
 d:'Plot IV against strikes and equity options show a lopsided curve: the further below the stock, the richer the IV. It’s a permanent crash-fear premium, born on Black Monday 1987 and sustained ever since by institutions endlessly buying downside protection. Sellers of put spreads quietly harvest skew; buyers of crash protection knowingly pay it.',
 viz:['skew']},
{t:'VIX', s:'The market’s "fear gauge" — IV of the S&P 500, as one number.',
 d:'The VIX condenses S&P 500 option prices into one 30-day implied volatility number. Historically it lives in the mid-teens, jumps into the 30s during scares, and has spiked above 80 in true crises (2008, 2020). Traders use it as weather report: VIX low = premium cheap everywhere; VIX exploding = insurance suddenly very expensive.'},
{t:'Black-Scholes', s:'The Nobel-winning formula behind every option price (including this game’s).',
 d:'In 1973, Black, Scholes and Merton showed an option’s fair price follows from five ingredients: stock price, strike, time left, interest rate, and volatility. Four are known facts — so trading options is really trading the fifth. The formula’s limits (it assumes calm, bell-curved markets) are exactly where tail-risk thinking begins.'},
]],
['Strategies', [
{t:'Covered call', s:'Own 100 shares, sell a call against them. Rent on stock you hold.',
 d:'You collect the call’s premium immediately. If the stock stays below the strike: keep shares AND premium, repeat next month. If it rallies past the strike: your shares are sold ("called away") at the strike — profitable, but capped. You’ve traded away the moonshot in exchange for income. Best on stocks you’re happy holding that aren’t going anywhere fast.',
 ex:'Own 100 DIS at $80. Sell the 30-day $85 call for $0.90 ($90). Sideways month → +$90, repeat. DIS moons to $95 → you still sold at $85 + kept $90 — profit, with a ceiling.',
 viz:['payoff',{legs:[{type:'stock',side:1,qty:100,premium:80},{type:'call',side:-1,strike:85,qty:1,premium:0.9}],spot:80,range:[68,96],cap:'Stock + short $85 call: downside like stock (minus premium), upside flattens at the strike.'}]},
{t:'Cash-secured put', s:'Sell a put with the cash set aside to buy the shares. Paid to promise.',
 d:'You promise to buy 100 shares at the strike if asked, and park the full cash as collateral. The market pays you a premium for that promise. Stock stays up: keep the premium, promise expires. Stock dips through: you buy a stock you wanted at your chosen price — minus the premium. The only rule that matters: only sell puts on stocks you’d GENUINELY be happy to own at that strike.',
 ex:'DIS at $80. Sell the $76 put for $0.55, holding $7,600 aside. Assigned at $74.9 → you own DIS at an effective $75.45 while day-one buyers paid $80.',
 viz:['payoff',{legs:[{type:'put',side:-1,strike:76,qty:1,premium:0.55}],spot:80,range:[64,90],cap:'Short $76 put: keep $55 anywhere above $76; below, you buy shares (increasingly at a loss on paper).'}]},
{t:'Protective put (married put)', s:'Own shares + buy a put = insured stock.',
 d:'The put is an insurance policy on shares you hold: below the strike, every further dollar of stock loss is refunded by the put. Cost: the premium, which usually expires "wasted" — exactly like home insurance. The professional framing: you’re choosing a known floor for your portfolio in exchange for a known fee.',
 viz:['payoff',{legs:[{type:'stock',side:1,qty:100,premium:80},{type:'put',side:1,strike:74,qty:1,premium:1.1}],spot:80,range:[60,96],cap:'Stock + $74 put: losses stop at the floor; upside continues (minus the premium paid).'}]},
{t:'Collar', s:'Own shares + buy a put + sell a call: insurance paid for with your upside.',
 d:'A protective put funded by a covered call. The sold call’s premium pays for (some of) the put’s cost — often making the insurance nearly free. The price: your upside is capped at the call strike. Result: stock boxed into a known range. Beloved by executives and anyone who must hold a position but can’t stomach its tail risk.',
 viz:['payoff',{legs:[{type:'stock',side:1,qty:100,premium:80},{type:'put',side:1,strike:74,qty:1,premium:1.1},{type:'call',side:-1,strike:86,qty:1,premium:1.0}],spot:80,range:[62,98],cap:'The collar: floor at $74, ceiling at $86, nearly zero net premium.'}]},
{t:'Naked option', s:'A sold option with nothing backing it. The account-killer.',
 d:'"Naked" = short an option without shares, cash, or a hedging leg behind it. A naked put’s risk is the stock going to zero — bad. A naked call’s risk is the stock going to infinity — unbounded. One meme-stock squeeze against a naked call has ended real careers. The professional default is simple: never sell unlimited risk. Wings are cheap; ruin is not.',
 viz:['payoff',{legs:[{type:'call',side:-1,strike:105,qty:1,premium:1.2}],spot:100,range:[85,130],cap:'Short (naked) $105 call: collect $120 now… and lose without limit if the stock keeps climbing.'}]},
{t:'Vertical spread', s:'Buy one option, sell another (same type & expiry, different strike).',
 d:'The workhorse structure of defined-risk trading. The sold leg refunds part of your cost (debit spreads) or the bought leg caps your risk (credit spreads). Every vertical’s worst case and best case are known to the dollar before entry — which makes position sizing honest.'},
{t:'Debit spread (e.g. bull call spread)', s:'A directional bet at a discount, with capped gain.',
 d:'Buy a call, sell a higher-strike call. The short leg’s premium cuts your cost roughly in half; in exchange your profit stops at the top strike. Perfect for MODEST directional views — "I think it grinds to $85, not $95." Max loss: the debit paid. Max gain: width minus debit.',
 ex:'ACME-style setup: buy the $80 call ($2.00), sell the $85 call ($0.50). Net cost $150. Stock at $85+ by expiry → worth $500 → profit $350.',
 viz:['payoff',{legs:[{type:'call',side:1,strike:80,qty:1,premium:2.0},{type:'call',side:-1,strike:85,qty:1,premium:0.5}],spot:80,range:[72,93],cap:'Bull call spread 80/85 for $1.50: risk $150 to make up to $350.'}]},
{t:'Credit spread (e.g. bull put spread)', s:'Get paid up front; win if the stock simply doesn’t cross your strike.',
 d:'Sell a put below the market, buy a further one as the safety net, pocket the difference. The stock can rise, drift, or even dip a little — you keep the credit as long as it stays above the short strike. You’re not betting ON a move; you’re betting AGAINST a big one. Three of four outcomes pay you — in exchange for a max loss larger than the credit.',
 ex:'Sell the $76 put, buy the $72 put on DIS for $0.80 credit. Max gain $80 (stock above $76); max loss $320 (below $72).',
 viz:['payoff',{legs:[{type:'put',side:-1,strike:76,qty:1,premium:1.1},{type:'put',side:1,strike:72,qty:1,premium:0.3}],spot:80,range:[64,90],cap:'Bull put spread: flat profit zone right of the short strike; capped loss floor left of the long strike.'}]},
{t:'Straddle', s:'Buy the call AND the put at the same strike: a pure bet on movement.',
 d:'Direction becomes irrelevant — a big move either way pays. The catch: you paid two premiums, so the move must beat both combined (wide break-evens). Buy straddles when you expect more chaos than the market has priced (low IV rank + a real catalyst); sell them when the market has priced chaos that won’t come.',
 ex:'PLTR at $50, the $50 straddle costs $4. You profit below $46 or above $54 — the stock must move over 8%.',
 viz:['payoff',{legs:[{type:'call',side:1,strike:50,qty:1,premium:2},{type:'put',side:1,strike:50,qty:1,premium:2}],spot:50,range:[40,60],cap:'Long straddle: the V. Loss is capped at the double premium; profit grows with ANY big move.'}]},
{t:'Strangle', s:'The straddle’s cheaper cousin: call and put at different strikes.',
 d:'Move the strikes apart and the price drops sharply — but the stock must now travel further before either side pays. Buy strangles for cheap exposure to explosions; SELL strangles (carefully, or as an iron condor) to collect double premium from a stock going nowhere.',
 viz:['payoff',{legs:[{type:'call',side:1,strike:55,qty:1,premium:0.8},{type:'put',side:1,strike:45,qty:1,premium:0.8}],spot:50,range:[36,64],cap:'Long 45/55 strangle: cheaper than the straddle, wider dead zone in the middle.'}]},
{t:'Iron condor', s:'Sell a put spread below AND a call spread above: income from a range.',
 d:'The flagship "this stock is going nowhere" trade. Four legs: short strangle in the middle collecting premium, protective wings outside capping both tails. If the stock stays between the short strikes, everything expires and you keep the credit. Deploy in high IV rank with a quiet calendar — and size by the defined max loss, not the credit.',
 ex:'SBUX at $100: sell the $96 put & $105 call, buy the $92 put & $109 call for a $70 net credit. SBUX anywhere in 96–105 at expiry → +$70. Max loss $180.',
 viz:['payoff',{legs:[{type:'put',side:-1,strike:96,qty:1,premium:0.9},{type:'put',side:1,strike:92,qty:1,premium:0.35},{type:'call',side:-1,strike:105,qty:1,premium:0.55},{type:'call',side:1,strike:109,qty:1,premium:0.25}],spot:100,range:[86,116],cap:'The condor’s plateau: profit in the middle, capped loss on both tails.'}]},
{t:'Butterfly', s:'A cheap, precise bet that the stock PINS a specific price.',
 d:'Buy one option below, sell two at the middle strike, buy one above (all calls or all puts). Costs very little; pays best if the stock lands exactly on the middle strike at expiry. A sniper’s tool: low probability of the full payoff, but spectacular reward-to-risk when you have a strong opinion about WHERE a stock will settle.',
 viz:['payoff',{legs:[{type:'call',side:1,strike:95,qty:1,premium:6.2},{type:'call',side:-2,strike:100,qty:1,premium:2.9},{type:'call',side:1,strike:105,qty:1,premium:1.1}],spot:100,range:[88,112],cap:'The 95/100/105 butterfly: a tent — max payoff exactly at $100, tiny cost either side.'}]},
{t:'Calendar spread', s:'Sell a short-dated option, buy a longer-dated one at the same strike.',
 d:'Different expirations, same strike. The near option melts fast (you sold it — good), the far option melts slowly (you own it — also good). Profits if the stock sits near the strike while the near leg decays away. It’s a bet on time and calm, and secretly on IV rising in the back month. More moving parts than a vertical — a post-basics tool.'},
{t:'Diagonal spread', s:'A calendar with different strikes: time spread + direction.',
 d:'Buy a longer-dated option at one strike, sell a shorter-dated one at another. The famous version — "poor man’s covered call" — buys a deep-ITM LEAPS call as a stock substitute and sells monthly calls against it, mimicking a covered call at a fraction of the capital.'},
{t:'Ratio spread', s:'Unequal legs — e.g. buy 1 call, sell 2 higher calls.',
 d:'Selling extra options finances the bought one (often making the trade free or a credit)… but that extra short option is UNCOVERED, reintroducing open-ended risk on big moves. Used by professionals with hedges in place; listed here so you recognize it — and treat it with respect.'},
{t:'Synthetic stock', s:'Options assembled to behave exactly like shares.',
 d:'Buy a call + sell a put at the same strike & expiry = the payoff of owning 100 shares (a "synthetic long"), built with a fraction of the cash. Elegant, and a window into option theory (put-call parity: calls, puts, and stock are convertible into each other) — but remember the short put carries full downside, just like real shares.'},
{t:'The wheel', s:'CSP → (assigned?) covered calls → called away → repeat.',
 d:'An income loop combining the two friendliest strategies: sell cash-secured puts on a stock you want until assigned; then sell covered calls on the shares until they’re called away; repeat forever. Every stage collects premium and lowers cost basis. The golden rule — worth repeating forever — is that the wheel only works on stocks you’d genuinely hold; no premium is fat enough to bail out a broken company.',
 viz:['wheelviz']},
{t:'Rolling', s:'Closing an option and reopening it further out in time (or at a new strike).',
 d:'One combined adjustment: buy back your short option, sell another with more DTE (and often a different strike), usually for an additional credit. Rolling buys time for a trade under pressure or extends a winner — it’s how the "exit by 21 DTE" rule is implemented without abandoning a position. Rule of thumb: only roll for a credit; rolling for a debit is usually denial with extra steps.'},
{t:'Defined risk', s:'Worst case known and capped before you enter. The professional default.',
 d:'A position whose maximum loss is a printed number: long options, verticals, condors, butterflies. Defined risk turns disasters into line items and makes honest position sizing possible ("this trade can lose at most $330, which is 2% of my account"). Its opposite — undefined risk — is how one bad night deletes a year of wins.'},
{t:'Collateral & margin', s:'What you pledge to guarantee your promises.',
 d:'Short options are promises, and brokers demand security: a cash-secured put locks up the full strike × 100; a credit spread locks its max loss; portfolio margin (pro accounts) computes fancier requirements. In this game’s practice desk, collateral equals the defined max loss — the honest amount. If a trade’s collateral makes you wince, the position is too big.'},
]],
['Risk & the Professional Mindset', [
{t:'Expected value (EV)', s:'The long-run average of a bet: (win% × avg win) − (loss% × avg loss).',
 d:'The only score professionals keep. A trade’s outcome is luck; its expected value is skill. Compute it for everything: a 90% win rate means NOTHING until you know the sizes of the wins and losses. Casinos never win every hand — they win every year, because every game they offer is +EV for the house. Your job is to be the house.',
 ex:'Win 80% of the time: +$50. Lose 20%: −$300. EV = 0.8(50) − 0.2(300) = −$20 per trade. This "great" strategy loses $2,000 per hundred trades.',
 viz:['ev']},
{t:'Resulting', s:'Judging a decision by one outcome instead of its process.',
 d:'Poker player Annie Duke’s term for the most natural mistake in the world: the trade won, so it was smart; it lost, so it was dumb. Wrong on both counts — good decisions lose sometimes, terrible decisions win sometimes. Over a career, process is everything and any single outcome is noise. Grade yourself on whether you’d make the same decision again with the same information.',
 ex:'You sell a naked put for $4 risking $7,000 and win. Resulting says "genius." EV math says you just got paid pennies to dodge a steamroller — and one day it won’t miss.'},
{t:'Law of large numbers', s:'Edges only show up reliably across MANY tries.',
 d:'Flip a fair coin 10 times and 7 heads is unremarkable; flip 10,000 times and the ratio hugs 50%. Same with trading: a genuine edge can lose for weeks, and randomness can flatter garbage for months. The professional response: many small trades (so the average has room to assert itself) rather than a few huge ones (where one unlucky flip is fatal). Hence the motto: trade small, trade often.'},
{t:'Win rate', s:'How often a strategy profits — the most seductive, least important stat.',
 d:'High win rates FEEL wonderful and prove nothing: selling deep OTM options wins constantly, right up until one loss returns years of gains. Low win rates feel awful and can be brilliant: tail hedges lose small almost always and occasionally save the firm. Win rate only means something next to the SIZE of wins and losses — which is EV.'},
{t:'Reward-to-risk ratio', s:'Average win size vs average loss size.',
 d:'The other half of the EV equation. A 1:3 reward-to-risk (win $100, lose $300) needs a 75%+ win rate just to break even; a 3:1 needs only 25%. Every strategy is a tradeoff along this curve — premium selling sits at high-win-rate/poor-ratio, tail hedging at the opposite corner. Know where yours sits before judging any losing streak.'},
{t:'Position sizing', s:'How much one trade can cost you. The #1 survival decision.',
 d:'The professional convention: risk 1–5% of the account per trade, computed from defined max loss. At 2%, ten straight losses — which WILL eventually happen — costs 18% of the account: painful, recoverable. At 25%, the same streak is oblivion. Sizing has a hidden second job: small positions keep your brain calm enough to follow your own plan. Oversized positions make otherwise smart people do panicked, stupid things.',
 ex:'$10,000 account, 3% rule → max loss per trade $300 → that $330-max-loss put spread is fine at 1 contract, reckless at 5.'},
{t:'Kelly criterion', s:'The math of optimal bet size — and why pros bet below it.',
 d:'Given your edge and odds, the Kelly formula computes the bet size that maximizes long-run growth. Two lessons hide in its curve: betting MORE than Kelly doesn’t just add risk — it mathematically REDUCES growth, all the way to ruin; and because you never know your real edge precisely, professionals bet a fraction ("half-Kelly") of the estimate. Aggression past the peak is pure downside.',
 viz:['kelly']},
{t:'Risk of ruin', s:'The odds your account hits a point of no return.',
 d:'Formalized by Ralph Vince: from win rate, payoff ratio, and bet size, you can compute the probability of eventually digging a hole too deep to climb out of. The punchline of the math: bet size dominates. The same strategy can have near-zero ruin risk at 2% sizing and near-certain ruin at 30%. Positive expected value does NOT protect you — ruin eats edges for breakfast.',
 viz:['ruin']},
{t:'Drawdown', s:'The fall from your account’s peak — and the asymmetric climb back.',
 d:'Measured peak-to-trough: grow $10k to $14k, dip to $11.2k — that’s a 20% drawdown. The cruelty is asymmetric: −10% needs +11% back, −33% needs +50%, −50% needs +100%. Every percent deeper roughly doubles the difficulty of recovery. Professionals obsess over limiting drawdowns first and chase returns second — because the math says survival IS the strategy.',
 viz:['drawdown']},
{t:'Stop-loss', s:'A pre-committed exit that caps a losing trade.',
 d:'Decided BEFORE entry, while you’re still calm: "if this loses $X or breaks $Y, I’m out, no debate." Two caveats every professional knows: stops can’t protect against overnight gaps (the price teleports past them — use defined-risk structures for that), and a stop moved mid-trade to "give it room" is no longer a stop; it’s the removal of the only bound on your loss.'},
{t:'Managing winners (the 50% rule)', s:'Close profitable short-premium trades at ~half their max profit.',
 d:'Premium-selling P/L arrives lopsidedly: the first 50% of the credit comes fast, the last 50% dribbles in while gamma risk grows huge. Backtests (tastytrade published mountains of them) consistently show that taking profit around 50% of max and redeploying beats holding to expiry — higher win rates, smoother equity, far fewer catastrophes. Leaving the party early isn’t timid; it’s the mechanically optimal exit.',
 ex:'Collect a $100 credit → place a standing order to buy it back at $50. Done. No feelings involved.',
 viz:['manage']},
{t:'21 DTE rule', s:'Exit or roll short options ~3 weeks before expiry.',
 d:'The companion to the 50% rule, targeting the same enemy: the endgame. Inside ~21 days, gamma turns every wobble violent while the remaining premium you’re "waiting for" is small. The rule converts a discretionary agonize-daily decision into a mechanical one: at 21 DTE you’re out — taking whatever profit or loss exists — or rolled to the next cycle for a credit.'},
{t:'Probability of profit (POP)', s:'The odds a trade makes at least $0.01 — useful, and seductive.',
 d:'Estimated from option deltas: sell a 0.30-delta put and POP ≈ 70%. Platforms display it prominently because big numbers feel great. The professional discount: POP says nothing about SIZE of outcomes. A 95% POP trade that risks $700 to make $10 is a terrible business. Always read POP together with max loss — what are you paid per unit of catastrophe?'},
{t:'Delta-neutral', s:'A book hedged to net delta ≈ 0: direction stops mattering.',
 d:'Sum every position’s delta and offset the total with stock. Now the market can wiggle and your P/L barely responds — what remains is exposure to volatility (vega) and time (theta), which is the purified bet professionals actually want. This is the resting state of every market maker’s book, re-balanced continuously all day.'},
{t:'Gamma scalping', s:'Long options + re-hedging = harvesting movement itself.',
 d:'Own options (positive gamma), hedge delta-neutral, then re-hedge after every move: the stock rises, you sell some shares; it falls, you buy them back. Buy-low-sell-high happens mechanically, over and over. The harvest profits when realized volatility exceeds the IV you paid — gamma scalping is literally the machine that converts "the market is choppier than priced" into money.'},
{t:'Portfolio Greeks (the book)', s:'The summed Greeks of everything you hold.',
 d:'Professionals don’t ask "how’s this trade doing?" — they ask "what’s my BOOK’s net delta, theta, vega?" Ten clever positions might accidentally sum to one huge directional bet; the book view catches it. Your homework as you advance: after every new trade, glance at the totals. You are always running exactly one portfolio, whether you look at it or not.'},
{t:'Tail risk', s:'Rare, extreme events — small probability, account-ending size.',
 d:'Markets are not the tidy bell curve of textbooks: crashes of "impossible" size arrive every decade or so. Tail risk is everything living in that far-left region. Strategies that sell insurance collect steadily FROM tail risk — and owe everything when a tail arrives. The professional posture: harvest premium if you like, but never be the one holding unlimited exposure when the tail shows up.'},
{t:'Black swan', s:'Taleb’s term: the unpredictable extreme that’s "obvious" only afterwards.',
 d:'Nassim Taleb’s definition has three parts: an event that’s an outlier, carries massive impact, and gets rationalized after the fact ("the signs were everywhere"). The practical conclusion isn’t to predict swans — they’re unpredictable by definition — but to build positions that survive them, or better, benefit from them (see <b>Convexity</b> and <b>Barbell</b>).'},
{t:'Convexity', s:'Payoffs that ACCELERATE as moves get extreme. Long options have it.',
 d:'A convex position’s gains curve upward: twice the move pays far more than twice the profit, while the cost stays fixed and capped. Long options are convex; short options are the opposite (concave — limited gain, accelerating loss). Convexity is why a tiny put position can offset a huge portfolio loss in a crash, and why Taleb tells traders to keep their downside capped and their upside open.',
 viz:['convex']},
{t:'Barbell strategy', s:'Most capital ultra-safe + a small slice in convex bets. Nothing in the middle.',
 d:'Taleb’s construction: ~85–90% of capital in things that cannot blow up, ~10–15% in things that can explode UPWARD (far-OTM options, asymmetric bets), and deliberately nothing in the "moderately risky" middle where hidden fragility lives. Applied to option income: sell your premium, but spend a budgeted share of it on far-OTM protection. It drags returns in calm years and owns the crisis years — which is the whole point.'},
{t:'Black Monday (October 19, 1987)', s:'The −23% day that permanently rewired option prices.',
 d:'The largest one-day US stock crash in history — down 23% in a single session, an event standard models called essentially impossible. Before 1987, IV was roughly flat across strikes; ever since, downside puts have carried a permanent crash premium (see <b>Skew</b>). Every option chain you will ever read still carries the scar of that Monday — the market’s institutional memory that the "impossible" happens.'},
{t:'Revenge trading & tilt', s:'Trading to un-feel a loss. The classic account-killer.',
 d:'Poker calls it tilt: after a painful loss, the urge to win it back RIGHT NOW — bigger size, looser standards, borrowed conviction. It’s exactly backwards: losses raise emotion and lower judgment, so post-loss trades tend to be the worst-chosen AND the biggest. The professional protocols are boring and effective: fixed sizing rules, a written plan, and full permission to walk away from the desk. The market opens again tomorrow.'},
]],
];

let glossEl = null, glossBackEl = null;
function buildGloss(){
  if(glossEl) return;
  glossBackEl = h('div',{cls:'gloss-back',onclick:closeGloss});
  const body = h('div',{cls:'body'});
  const none = h('div',{cls:'none'},'No matching terms.');
  none.style.display='none';
  const total = GLOSSARY.reduce((a,c)=>a+c[1].length,0);
  const inp = h('input',{type:'search',placeholder:'Search '+total+' terms…'});
  const groups = [];
  for(const [cat, entries] of GLOSSARY){
    const catEl = h('div',{cls:'cat'},cat);
    const els = entries.map(en=>{
      const more = h('div',{cls:'more'});
      const head = h('div',{cls:'ehead'},
        h('div',{style:{flex:1}}, h('div',{cls:'term'},en.t), h('div',{cls:'def'},en.s)),
        h('span',{cls:'chev'},'▾'));
      const e = h('div',{cls:'entry'}, head, more);
      e.dataset.q = (en.t+' '+en.s+' '+en.d+' '+(en.ex||'')).toLowerCase();
      let built = false;
      head.addEventListener('click',()=>{
        const open = e.classList.toggle('open');
        if(open && !built){
          built = true;
          more.append(h('div',{cls:'ldef',html:en.d}));
          if(en.viz){ const v = glossViz(en.viz); if(v) more.append(v); }
          if(en.ex) more.append(h('div',{cls:'exbox',html:'<b>Example ·</b> '+en.ex}));
        }
      });
      return e;
    });
    groups.push({catEl, els});
    body.append(catEl, ...els);
  }
  body.append(none);
  inp.addEventListener('input',()=>{
    const q = inp.value.trim().toLowerCase();
    let any=false;
    for(const g of groups){
      let vis=0;
      for(const e of g.els){
        const show = !q || e.dataset.q.includes(q);
        e.style.display = show?'':'none';
        if(show) vis++;
      }
      g.catEl.style.display = vis?'':'none';
      if(vis) any=true;
    }
    none.style.display = any?'none':'';
  });
  glossEl = h('div',{cls:'gloss',role:'dialog','aria-label':'Glossary'},
    h('header',{},h('h2',{},'Glossary'),h('button',{cls:'x',onclick:closeGloss,'aria-label':'Close'},'✕')),
    h('div',{cls:'search'},inp),
    h('div',{cls:'ghint'},'Tap any term for the full explanation, an example, and a diagram.'),
    body);
  document.addEventListener('keydown',ev=>{ if(ev.key==='Escape') closeGloss(); });
}
function openGloss(){
  buildGloss();
  if(glossEl.isConnected) return;
  document.body.append(glossBackEl, glossEl);
  document.body.style.overflow='hidden';
  const inp = glossEl.querySelector('input'); if(matchMedia('(min-width:960px)').matches) inp.focus();
}
function closeGloss(){
  if(glossEl && glossEl.isConnected){ glossBackEl.remove(); glossEl.remove(); document.body.style.overflow=''; }
}
function glossInit(){
  const fab = h('button',{cls:'gloss-fab',title:'Glossary — every finance term in the course',onclick:openGloss,
    html:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M9 7h7M9 11h5"/></svg>'});
  document.body.append(fab);
}

/* ============================================================
   8. ROUTER + BOOT  (screens register themselves in SCREENS)
   ============================================================ */
window.addEventListener('DOMContentLoaded', ()=>{
  load(); touchDaily(); glossInit();
  // engine self-check (dev): BS(100,100,1,.2,r=.05) call ≈ 10.45
  const chk = bsPrice('call',100,100,1,0.2,0.05);
  if(Math.abs(chk-10.4506)>0.01) console.warn('BS self-check off:', chk);
  go('title');
});
</script>
