      colL.append(f);
    }
    // reset
    colL.append(h('button',{cls:'btn ghost',style:{marginTop:'6px'},onclick:()=>{
      if(sb.cash<500) sb.blowups=(sb.blowups||0)+1;
      sb.cash=10000; sb.positions=[]; sb.feed=[]; sb.day=0; sb.tickers=null; sbInit();
      toast('Account reset — fresh $10,000');
      save(); render();
    }},'Reset account ($10,000)'));
    scr.append(h('p',{cls:'footer-note'},'Real tickers, simulated prices (geometric Brownian motion + Black-Scholes) — not live market data. PLTR has surprise earnings. Short puts must be cash-secured; naked calls need a spread (Tier 3).'));
  }
  // ---- strategy template ticket (tier 4) ----
  function openTemplate(kind){
    const tk = sb.tickers[sbTab];
    const K = Math.round(tk.S/2.5)*2.5, w = 2.5;
    let qty = 1;
    const defs = {
      straddle: [{type:'call',side:1,strike:K},{type:'put',side:1,strike:K}],
      strangle: [{type:'call',side:1,strike:K+2*w},{type:'put',side:1,strike:K-2*w}],
      condor:   [{type:'put',side:-1,strike:K-2*w},{type:'put',side:1,strike:K-3*w},{type:'call',side:-1,strike:K+2*w},{type:'call',side:1,strike:K+3*w}],
      putspread:[{type:'put',side:-1,strike:K-w},{type:'put',side:1,strike:K-2*w}],
      callspread:[{type:'call',side:-1,strike:K+w},{type:'call',side:1,strike:K+2*w}],
    };
    const names = {straddle:'Long straddle',strangle:'Long strangle',condor:'Iron condor',putspread:'Put credit spread',callspread:'Call credit spread'};
    const back = h('div',{cls:'sheet-back'});
    const sheet = h('div',{cls:'sheet'});
    const close = ()=>{back.remove();sheet.remove();};
    back.addEventListener('click',close);
    const body = h('div'); sheet.append(body);
    const dia = payoffDiagram({height:180});
    function legsNow(){
      return defs[kind].map(l=>{
        const q = quote(l.type, tk.S, l.strike, sbDte/252, tk.iv);
        return Object.assign({}, l, {qty, premium: l.side>0? q.ask : q.bid, dte0:sbDte, openDay:sb.day});
      });
    }
    function draw(){
      body.innerHTML='';
      const legs = legsNow();
      const debit = posEntryCost(legs);
      const st = posStats(legs, tk.S);
      const locked = debit>=0 ? 0 : (st.maxLoss===null? null : Math.abs(st.maxLoss)*1);
      body.append(h('h3',{},names[kind]+' · '+sbTab+' · '+sbDte+'d'),
        h('div',{cls:'dim',style:{fontSize:'12.5px',marginBottom:'6px'}},sbTab+' at '+fmt$(tk.S)));
      const qr = h('div',{cls:'btnrow'});
      for(const n of [1,2,5]) qr.append(h('button',{cls:'btn small '+(qty===n?'primary':'ghost'),onclick:()=>{qty=n;draw();}},n+'×'));
      body.append(qr);
      for(const l of legs) body.append(h('div',{cls:'legrow'},h('span',{},legLabel(l)),h('span',{cls:'num'},fmt$(l.premium)+' ×100')));
      dia.update({legs, spot:tk.S, iv:tk.iv, dte:sbDte});
      body.append(dia.el);
      body.append(h('div',{cls:'card sub',style:{padding:'8px 14px'}},
        statRow(debit>=0?'You pay':'You receive', fmt$(Math.abs(debit)), debit>=0?'red':'green'),
        locked? statRow('Collateral held', fmt$(locked),'gold'):null,
        statRow('Max gain', st.maxGain===null?'Unlimited':fmt$(st.maxGain),'green'),
        statRow('Max loss', st.maxLoss===null?'Uncapped':fmt$(Math.abs(st.maxLoss)),'red')));
      const need = Math.max(debit,0) + (locked||0);
      if(locked===null) body.append(h('div',{cls:'card',style:{borderColor:'var(--red)',color:'var(--red)',fontWeight:600}},'Undefined risk — not allowed on this desk.'));
      else if(sb.cash < need) body.append(h('div',{cls:'card',style:{borderColor:'var(--red)',color:'var(--red)',fontWeight:600}},'Not enough cash for this trade.'));
      else body.append(h('button',{cls:'btn primary',onclick:()=>{
        const legs2 = legsNow();
        sb.cash = round2(sb.cash - debit - (locked||0));
        const pos = {sym:sbTab, legs:legs2, openDay:sb.day, locked:locked||0,
          label: legs2.map(l=>((l.side>0?'+':'−')+l.qty+' $'+l.strike+(l.type==='call'?'C':'P'))).join(' / ')};
        sb.positions.push(pos);
        sbFeed('Opened '+names[kind].toLowerCase()+' '+pos.label+(debit>=0?' for '+fmt$(debit):' collecting '+fmt$(-debit)));
        save(); close(); toast('Order filled'); render();
      }},'PLACE ORDER'));
      body.append(h('div',{style:{height:'8px'}}),h('button',{cls:'btn ghost',onclick:close},'Cancel'));
    }
    draw();
    document.body.append(back, sheet);
  }
  // ---- ticket ----
  function openTicket(type, K){
    const tk = sb.tickers[sbTab];
    let side = 1, qty = 1, hedgeK = null;
    const back = h('div',{cls:'sheet-back'});
    const sheet = h('div',{cls:'sheet'});
    back.addEventListener('click',()=>{back.remove();sheet.remove();});
    const dia = payoffDiagram({height:180});
    const body = h('div');
    function legsNow(){
      const q = quote(type, tk.S, K, sbDte/252, tk.iv);
      const legs = [{type, side, strike:K, qty, premium: side>0?q.ask:q.bid, dte0:sbDte, openDay:sb.day}];
      if(hedgeK!==null){
        const q2 = quote(type, tk.S, hedgeK, sbDte/252, tk.iv);
        legs.push({type, side:-side, strike:hedgeK, qty, premium: -side>0?q2.ask:q2.bid, dte0:sbDte, openDay:sb.day});
      }
      return legs;
    }
    function calc(legs){
      const debit = posEntryCost(legs); // + = you pay
      let locked = 0, blocked = null;
      if(side<0){
        if(hedgeK!==null) locked = Math.abs(K-hedgeK)*100*qty;              // defined-risk spread
        else if(type==='put') locked = K*100*qty;                            // cash-secured put
        else blocked = 'Naked calls aren\'t allowed on this desk — add a hedge leg (Tier 3) to cap the risk.';
      }
      const need = Math.max(debit,0) + locked - Math.min(debit,0)*0; // credit reduces nothing upfront; keep simple
      return {debit, locked, need, blocked};
    }
    function draw(){
      body.innerHTML='';
      const legs = legsNow();
      const c = calc(legs);
      body.append(h('h3',{},sbTab+' $'+K+' '+(type==='call'?'Call':'Put')+' · '+sbDte+'d'),
        h('div',{cls:'dim',style:{fontSize:'12.5px',marginBottom:'6px'}},sbTab+' at '+fmt$(tk.S)+' · ×100 shares per contract'));
      if(sb.tier>=2){
        const r = h('div',{cls:'btnrow'});
        r.append(h('button',{cls:'btn small '+(side>0?'primary':'ghost'),onclick:()=>{side=1;hedgeK=null;draw();}},'BUY'));
        r.append(h('button',{cls:'btn small '+(side<0?'primary':'ghost'),onclick:()=>{side=-1;draw();}},'SELL'));
        body.append(r);
      }
      const qr = h('div',{cls:'btnrow'});
      for(const n of [1,2,5]) qr.append(h('button',{cls:'btn small '+(qty===n?'primary':'ghost'),onclick:()=>{qty=n;draw();}},n+'×'));
      body.append(qr);
      if(sb.tier>=3){
        const hs2 = h('div',{cls:'btnrow'});
        hs2.append(h('button',{cls:'btn small '+(hedgeK===null?'primary':'ghost'),onclick:()=>{hedgeK=null;draw();}},'Single leg'));
        const off = type==='call'? 5 : -5;
        const hk = round2(K+off);
        hs2.append(h('button',{cls:'btn small '+(hedgeK!==null?'primary':'ghost'),onclick:()=>{hedgeK=hk;draw();}},'Spread w/ $'+hk));
        body.append(hs2);
      }
      dia.update({legs, spot:tk.S, iv:tk.iv, dte:sbDte});
      body.append(dia.el);
      const st = posStats(legs, tk.S);
      body.append(h('div',{cls:'card sub',style:{padding:'8px 14px'}},
        statRow(c.debit>=0?'You pay':'You receive', fmt$(Math.abs(c.debit)), c.debit>=0?'red':'green'),
        c.locked? statRow('Collateral held', fmt$(c.locked),'gold'):null,
        statRow('Max gain', st.maxGain===null?'Unlimited':fmt$(st.maxGain),'green'),
        statRow('Max loss', st.maxLoss===null?'Uncapped ⚠':fmt$(Math.abs(st.maxLoss)),'red'),
        statRow('Cash after', fmt$(round2(sb.cash - Math.max(c.debit,0) + Math.min(c.debit,0)*-1 - c.locked)))));
      if(c.blocked) body.append(h('div',{cls:'card',style:{borderColor:'var(--red)',color:'var(--red)',fontWeight:700,fontSize:'13.5px'}},''+c.blocked));
      else if(sb.cash < Math.max(c.debit,0)+c.locked) body.append(h('div',{cls:'card',style:{borderColor:'var(--red)',color:'var(--red)',fontWeight:700}},'Not enough cash for this trade.'));
      else body.append(h('button',{cls:'btn primary',onclick:()=>{
        const legs2 = legsNow();
        sb.cash = round2(sb.cash - c.debit - c.locked);
        const pos = {sym:sbTab, legs:legs2, openDay:sb.day, locked:c.locked,
          label: legs2.map(l=>((l.side>0?'+':'−')+l.qty+' $'+l.strike+(l.type==='call'?'C':'P'))).join(' / ')};
        sb.positions.push(pos);
        sbFeed('Opened '+pos.label+(c.debit>=0?' for '+fmt$(c.debit):' collecting '+fmt$(-c.debit)));
        save();
        back.remove(); sheet.remove();
        toast('Order filled'); render();
      }},'PLACE ORDER'));
      body.append(h('div',{style:{height:'8px'}}),h('button',{cls:'btn ghost',onclick:()=>{back.remove();sheet.remove();}},'Cancel'));
    }
    sheet.append(body); draw();
    document.body.append(back, sheet);
  }
  build();
};

/* ============================================================
   7d. GLOSSARY — searchable dictionary drawer (any screen)
   ============================================================ */
const GLOSSARY = [
['Basics', [
 ['Option','A contract giving the right — not the obligation — to buy or sell 100 shares of a stock at a fixed price before a set date. Calls and puts are the two kinds.'],
 ['Call','The right to BUY the stock at the strike price. Gains value when the stock rises. Think: a coupon locking in a purchase price.'],
 ['Put','The right to SELL the stock at the strike price. Gains value when the stock falls. Think: insurance on shares.'],
 ['Underlying','The stock (or index) an option is based on. A SBUX call\'s underlying is SBUX stock.'],
 ['Strike price','The fixed price locked into the option — the price you may buy at (call) or sell at (put).'],
 ['Premium','The price you pay (or collect) for an option itself. A buyer\'s maximum possible loss; a seller\'s maximum possible gain.'],
 ['Expiration','The date the option contract ends. After it, the right vanishes — the option is exercised, sold, or expires worthless.'],
 ['DTE','Days To Expiration — how many days remain on the option\'s clock.'],
 ['Contract multiplier','One option contract controls 100 shares, so a $1.50 premium really costs $150. Always multiply by 100.'],
 ['Leg','One component of a multi-part position. A spread has two legs; an iron condor has four.'],
 ['Exercise','Actually using the option\'s right — buying (call) or selling (put) the shares at the strike.'],
 ['Assignment','What the SELLER experiences when the buyer exercises: being required to deliver or purchase the shares at the strike.'],
 ['Expire worthless','An out-of-the-money option at expiration is worth $0. The buyer loses the premium; the seller keeps it.'],
 ['In the money (ITM)','An option with real, cash-it-now value: a call below the stock price, or a put above it.'],
 ['At the money (ATM)','An option whose strike is at (or very near) the current stock price.'],
 ['Out of the money (OTM)','An option with no intrinsic value yet: a call above the stock price, or a put below it. Its entire price is hope and time.'],
 ['Intrinsic value','The real value of exercising right now — stock price vs strike. Never negative.'],
 ['Extrinsic value','Everything in the premium beyond intrinsic value: payment for time and possibility. Melts to zero by expiration.'],
 ['Break-even','The stock price at which an option trade neither makes nor loses money at expiration. For a bought call: strike + premium.'],
 ['Option chain','The full table of available options: every strike and expiration, calls on one side, puts on the other.'],
 ['Bid / Ask','The bid is what buyers will pay; the ask is what sellers demand. You buy at the ask, sell at the bid.'],
 ['Bid/ask spread','The gap between bid and ask — an invisible cost paid every round trip. Tight spread = liquid market.'],
 ['Liquidity','How easily a market lets you trade near fair value. Professionals screen for liquidity BEFORE strategy.'],
 ['Slippage','Money lost to the bid/ask spread and price movement while entering or exiting a trade — the market\'s rake.'],
 ['P/L','Profit and loss — how much a position has made or lost.'],
 ['Cost basis','What you effectively paid per share, after adjusting for premiums collected. Assigned at $76 after a $0.55 credit → basis $75.45.'],
]],
['Greeks & Volatility', [
 ['Greeks','The sensitivity dials of an option: delta (direction), gamma (delta\'s change), theta (time), vega (volatility). Named after Greek letters.'],
 ['Delta','How much the option price moves per $1 move in the stock (0 to 1 for calls, 0 to −1 for puts). Doubles as a rough probability of finishing ITM.'],
 ['Gamma','How fast delta itself changes as the stock moves. Explodes near expiration — the reason short options get violent late in their life.'],
 ['Theta','Daily time decay — how much value an option loses per day, all else equal. Works against buyers, pays sellers.'],
 ['Vega','How much the option price changes when implied volatility moves 1 point. Long options are long vega.'],
 ['Implied volatility (IV)','The market\'s priced-in expectation of future movement, expressed as an annualized %. High IV = expensive options.'],
 ['Realized volatility','How much the stock ACTUALLY moves. Compare with implied volatility to judge whether options were over- or under-priced.'],
 ['Volatility risk premium','The persistent tendency of implied volatility to exceed realized volatility — options are insurance, and insurance is priced above fair. The structural edge of premium sellers.'],
 ['IV crush','The sharp collapse of implied volatility right after a known event (like earnings) resolves. Can make a call lose money even when the stock gaps up.'],
 ['IV rank','Where today\'s IV sits within the stock\'s own 52-week IV range (0–100). The professional signal: sell premium when high, buy when low.'],
 ['Skew (volatility smirk)','Downside puts trade at higher IV than equidistant upside calls — a permanent crash premium priced in ever since October 1987.'],
 ['Black-Scholes','The Nobel-winning formula that prices options from stock price, strike, time, interest rate, and volatility. Powers every price in this game.'],
]],
['Strategies', [
 ['Covered call','Own 100 shares and sell a call against them. Collects rent; caps upside at the strike. The world\'s most popular income trade.'],
 ['Cash-secured put','Sell a put while holding enough cash to buy the shares if assigned. Gets paid to promise to buy a stock you want, at a discount.'],
 ['Naked option','A sold option with no offsetting shares, cash, or hedge. Naked calls carry unlimited risk — banned on most sensible desks.'],
 ['Vertical spread','Buy one option and sell another of the same type and expiration at a different strike. Caps both risk and reward.'],
 ['Debit spread','A spread you PAY for (e.g., bull call spread). Max loss = what you paid; max gain = strike width minus cost.'],
 ['Credit spread','A spread you\'re PAID for (e.g., bull put spread). Max gain = the credit; max loss = strike width minus credit. Profits if the stock simply doesn\'t cross the short strike.'],
 ['Straddle','Buy (or sell) both the call and put at the same strike. A pure bet on the SIZE of the move, not its direction.'],
 ['Strangle','A straddle\'s cheaper cousin: the call and put strikes are set apart. Costs less, needs a bigger move.'],
 ['Iron condor','A short strangle with protective wings: sell a put spread below and a call spread above. Defined-risk income if the stock stays in a range.'],
 ['The wheel','A cycle: sell cash-secured puts → if assigned, sell covered calls → if called away, repeat. Golden rule: only on stocks you\'d genuinely own.'],
 ['Rolling','Closing an option and opening a similar one at a later expiration (and/or different strike) in a single adjustment — buying time or repositioning.'],
 ['Defined risk','Any position whose worst-case loss is known and capped at entry — spreads, condors, long options. The professional default.'],
 ['Collateral','Cash or margin set aside to guarantee you can honor a short option\'s obligations — e.g., the full strike value behind a cash-secured put.'],
 ['Margin','Borrowed buying power, or the deposit a broker requires to hold risky positions. This game uses cash-secured rules instead.'],
]],
['Risk & the Professional Mindset', [
 ['Expected value (EV)','The long-run average result of a repeated decision: (win% × avg win) − (loss% × avg loss). The professional\'s only scoreboard — win rate alone is a decoy.'],
 ['Resulting','Judging a decision by its single outcome instead of its process. A good trade can lose; a terrible trade can win once. Poker term, coined by Annie Duke.'],
 ['Law of large numbers','An edge only shows up reliably across MANY repetitions. The reason professionals trade small and often instead of making a few big bets.'],
 ['Position sizing','How much of the account one trade can lose. The professional convention: risk 1–5% per trade. The single biggest lever on survival.'],
 ['Risk of ruin','The probability that drawdowns bury an account so deep it can\'t recover. Driven mostly by position size — formalized by Ralph Vince.'],
 ['Drawdown','A decline from the account\'s peak. Recovery is asymmetric: −10% needs +11%, −50% needs +100%.'],
 ['Probability of profit (POP)','The estimated odds a position makes at least $0.01 by expiration. High POP usually means small reward and larger tail risk — check what you\'re paid per unit of catastrophe.'],
 ['Managing winners','Closing profitable short-premium trades early — around 50% of max profit — because the remaining profit accrues slowly while gamma risk grows. Backed by tastytrade\'s research.'],
 ['21 DTE rule','Exit or roll short options around 21 days to expiration to avoid the endgame, where gamma turns small moves into violent P/L swings.'],
 ['Stop-loss','A pre-committed exit point that caps a losing trade. Moving it mid-trade removes the only bound on how much you can lose.'],
 ['Revenge trading','Oversizing after a loss to "win it back" — the classic emotional account-killer. The plan, not the pain, decides the next trade.'],
 ['Delta-neutral','A book hedged so net delta ≈ 0: direction stops mattering, leaving a pure position on volatility and time. How market makers live.'],
 ['Gamma scalping','Long options + repeated re-hedging: sell shares as the stock rises, buy as it falls. Converts back-and-forth movement into profit when realized vol beats the IV paid.'],
 ['Portfolio Greeks','The summed delta, theta, and vega of ALL positions — the book. Professionals manage the book\'s net exposure, not individual trades.'],
 ['Tail risk','The danger of rare, extreme moves far outside normal daily noise. Small probability, account-ending magnitude.'],
 ['Black swan','Nassim Taleb\'s term for an unpredictable extreme event that\'s obvious only in hindsight — the thing tail hedges exist for.'],
 ['Convexity','A payoff that ACCELERATES as the move gets bigger — fixed, capped cost but exploding gains in extremes. What long options have and short options lack.'],
 ['Barbell strategy','Taleb\'s construction: most capital ultra-safe, a small budgeted slice in convex bets (like far-OTM puts), nothing in the fragile middle.'],
 ['Paper trading','Practicing with simulated money — like this entire game. Scar-tissue-free, which is both its feature and its limitation.'],
]],
];

let glossEl = null, glossBackEl = null;
function buildGloss(){
  if(glossEl) return;
  glossBackEl = h('div',{cls:'gloss-back',onclick:closeGloss});
  const body = h('div',{cls:'body'});
  const none = h('div',{cls:'none'},'No matching terms.');
  none.style.display='none';
  const inp = h('input',{type:'search',placeholder:'Search '+GLOSSARY.reduce((a,c)=>a+c[1].length,0)+' terms…'});
  const groups = [];
  for(const [cat, entries] of GLOSSARY){
    const catEl = h('div',{cls:'cat'},cat);
    const els = entries.map(([t,d])=>{
      const e = h('div',{cls:'entry'},h('div',{cls:'term'},t),h('div',{cls:'def'},d));
      e.dataset.q = (t+' '+d).toLowerCase();
      return e;
    });
    groups.push({catEl, els});
    body.append(catEl, ...els);
  }
  body.append(none);
  inp.addEventListener('input',()=>{
    const q = inp.value.trim().toLowerCase();
    let any=false;
    for(const g of groups){
      let vis=0;
      for(const e of g.els){
        const show = !q || e.dataset.q.includes(q);
        e.style.display = show?'':'none';
        if(show) vis++;
      }
      g.catEl.style.display = vis?'':'none';
      if(vis) any=true;
    }
    none.style.display = any?'none':'';
  });
  glossEl = h('div',{cls:'gloss',role:'dialog','aria-label':'Glossary'},
    h('header',{},h('h2',{},'Glossary'),h('button',{cls:'x',onclick:closeGloss,'aria-label':'Close'},'✕')),
    h('div',{cls:'search'},inp),
    body);
  document.addEventListener('keydown',ev=>{ if(ev.key==='Escape') closeGloss(); });
}
function openGloss(){
  buildGloss();
  if(glossEl.isConnected) return;
  document.body.append(glossBackEl, glossEl);
  document.body.style.overflow='hidden';
  const inp = glossEl.querySelector('input'); if(matchMedia('(min-width:960px)').matches) inp.focus();
}
function closeGloss(){
  if(glossEl && glossEl.isConnected){ glossBackEl.remove(); glossEl.remove(); document.body.style.overflow=''; }
}
function glossInit(){
  const fab = h('button',{cls:'gloss-fab',title:'Glossary — every finance term in the course',onclick:openGloss,
    html:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M9 7h7M9 11h5"/></svg>'});
  document.body.append(fab);
}
